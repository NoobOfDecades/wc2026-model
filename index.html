      <td style="font-family:monospace;color:var(--mut)">${lg.s}</td>${ex}</tr>`;
  }).join('');
  return`
  <div class="msect"><h3>THE DOMESTIC LEAGUE STRENGTH MODEL</h3>
    <p>This is an original method for rating national squads. Each player is scored on two things only: which club they played for and how that club finished in its domestic league, and how strong that league is relative to the rest of the world. Individual statistics — goals, assists, minutes, ratings — are deliberately excluded. The 26 player scores sum to a single national-team total.</p>
    <p>The thinking behind it is borrowed from evidence synthesis in medicine, specifically <b>systematic review</b> and <b>network meta-analysis</b>. A network meta-analysis solves a hard problem: how do you compare two treatments that were never tested head-to-head in the same trial? It does so by anchoring every treatment to common comparators, building a connected web of indirect evidence, so that interventions which never met directly can still be ranked on one scale. International football poses the same problem. The vast majority of these players have never shared a pitch, and they earn their reputations in leagues of very different quality — a strong season in a weaker league is not the same as a strong season in an elite one. Rating them by raw personal stats compares figures that were never produced under comparable conditions.</p>
    <p>This model treats domestic leagues as the common comparators. A player's club and its league finish place them on a shared, league-adjusted scale, so that two players who never met — and who play in competitions of unequal strength — can be compared on a single yardstick. It is an attempt to bring the discipline of indirect-comparison methodology to a question usually settled by intuition and highlight reels.</p></div>
  <div class="msect"><h3>🔬 BUILD RUN 2 — FULL PER-PLAYER COMPETITIVE CONTEXT (v5.0.0)</h3>
    <p>This version replaces the earlier single-club approximation with a deep, per-player competitive history for all 48 squads. Every player's score is now built from his <b>complete club history across the 2022-2026 cycle</b> — not just his current club. For each season a player spent at a club, the model records which league it was, how the club finished in that league, the league's strength, and which continental competition (Champions League, Europa League, Copa Libertadores, and so on) the club played and how far it went.</p>
    <p>Two mechanisms combine these into one score, faithfully to the original vision:</p>
    <p>• <b>Time-at-club (sequential moves):</b> a player who transferred mid-cycle has his score weighted by how long he spent at each club, measured in days — eleven months at one club counts roughly eleven times a one-month spell at another. This measures the <i>duration of the context</i>, not minutes on the pitch.<br>
    • <b>Competition-share (parallel competitions):</b> in a single season a club plays its domestic league and, simultaneously, a continental competition. The model splits that season's context across those parallel competitions by how the club's matches divided between them.</p>
    <p>More recent seasons are weighted more heavily than older ones (a decay across the cycle), because a club's standing — and a league's strength — drift over time. The result is a single context-weighted score per player; the 26 sum to the national total, exactly as before. No individual performance data (goals, assists, minutes, ratings, market value) is used anywhere — the upgrade is purely a richer, more honest map of <i>where</i> each player has competed.</p>
    <p style="font-size:11px;color:var(--mut)">Dataset: 1,534 researched player records across 48 squads, 6,090 club-season stints, assembled by deep multi-source research (Transfermarkt, FBref, Wikipedia, official competition sites — calendar/context facts only) and validated by an independent quality gate.</p>
    </div>
  <div class="msect"><h3>📊 DATA COVERAGE &amp; HONEST WEAK AREAS</h3>
    <p>In the spirit of full transparency, here is exactly how solid the underlying data is — strengths and limitations both:</p>
    <p><b>Strong:</b> 93% of player records are high or medium confidence. League-finish coverage is 96%. Every one of the 1,248 squad players matched to a researched context record. The top-tier nations (France, England, Spain, Brazil, Germany and so on) have essentially complete, high-confidence histories.</p>
    <p><b>Weaker (treated conservatively, never fabricated):</b></p>
    <p>• <b>Squad accuracy:</b> the original input rosters diverged heavily from the real announced squads for several nations; these were audited against official squad lists and corrected (two squads — Curaçao and Haiti — had to be largely reconstructed). The squads shown are now the verified 26-man lists.<br>
    • <b>Obscure-nation depth:</b> lower-division finishes and league sizes for nations like Haiti, Jordan, Iraq, Uzbekistan, Curaçao and Panama are thinner-sourced and carry most of the low-confidence flags. Conservative values were used rather than guesses.<br>
    • <b>Uncoded leagues:</b> about 6% of club spells are in leagues too obscure to have a derived strength weight; these are given a conservative low weight, which may slightly under-rate a handful of players.<br>
    • <b>Calendar granularity:</b> a small number of club spells in calendar-year leagues (Panama worst) span a long single record, reducing recency precision for those players. Total time-at-club is preserved.<br>
    • <b>In-progress 2025-26:</b> some current-season continental rounds and final positions were not yet settled at the data cutoff and were recorded conservatively.</p>
    <p style="font-size:11px;color:var(--mut)">The honest takeaway: the model is most reliable for the strong nations and progressively more approximate down the long tail — which is inherent to the problem, not a flaw in the method. Where the data is thin, it is flagged low-confidence rather than invented.</p>
    </div>
  <div class="msect"><h3>WHY CLUB CONTEXT, NOT PERSONAL STATS</h3>
    <p>The wager of the model is that a player's club environment — the level at which they are trusted to perform week in, week out, and how that side fares against comparable opposition — carries more comparable signal across borders than personal tallies do. A forward's goal count depends heavily on league quality, role, and service; the standard of club they hold down a place at is a steadier cross-league indicator. By scoring the context rather than the individual line, the model aims for fairness across wildly different footballing ecosystems rather than rewarding inflated numbers from weaker competitions. This is a clear, debatable modelling choice, not a claim that individual quality is irrelevant.</p></div>
  <div class="msect"><h3>CALCULATION BASIS — THREE MODES</h3>
    <p>The header switch changes every number in the app between three bases. It only changes <b>which players are summed</b> — never how a player is scored:</p>
    <ul><li><b style="color:var(--gold)">Starting XI</b> (default): only the likely 11 starters count (max 110). The realistic strength on the pitch; removes the distortion of deep benches at big clubs.</li>
    <li><b style="color:var(--gold)">Top 15</b>: the 11 starters plus the next 4 highest-scoring players (max 150). Rewards genuine bench depth — the rotation players who actually come on across an 8-game tournament — without the dead weight of squad places 16–26 dragging the total toward the mean.</li>
    <li><b style="color:var(--gold)">Whole Squad</b>: all 26 players count (max 260). Total depth, relevant when injuries/suspensions force deep rotation.</li></ul>
    <p>Likely XIs come from verified probable line-ups and recent match line-ups; unclear slots auto-fill with the highest-scoring available player in that position. Rankings and the Bracket recompute live on switch.</p></div>
  <div class="msect"><h3>STEP 1 — FINISHING POSITION SCORE (FPS)</h3>
    <p>An exponential, top-heavy curve. Champions score 10.0; relegation scores near zero. The 1.5 exponent makes title winners worth dramatically more than mid-table.</p>
    <div class="fbox">FPS = 10 × ((n − rank + 1) / n) ^ 1.5
where n = clubs in the league · rank = final league position</div>
    <p>20-team league: 1st=10.00 · 2nd=9.26 · 4th=7.83 · 8th=5.24 · 12th=3.02 · 20th=0.11</p></div>
  <div class="msect"><h3>STEP 2 — LEAGUE DIFFICULTY WEIGHT (LDW)</h3>
    <p>Anchor: Premier League = 1.00. A multiplier applied to FPS, calibrated from Opta team-quality, UEFA coefficients and squad values.</p><p style="color:var(--gold)">As of v5.8.0 these weights are derived from the independent <b>Opta Power Rankings</b> (top-club average per league, normalised to the Premier League = 1.00), not hand-estimated. See the "League-Strength Recalibration" section above for the full method and why it is calibration, not fitting.
    <div class="fbox">Player Score = FPS × LDW · Max = 10 × 1.00 = 10.0</div>
    <p>Winning the PL = 10.00 · winning La Liga = 9.40 · winning the Saudi Pro League = 5.50 · relegation from the Bundesliga = 0.12.</p></div>
  <div class="msect"><div class="msect"><h3>⚖️ LEAGUE-STRENGTH RECALIBRATION (v5.8.0) — AND THE DISCIPLINE BEHIND IT</h3>
    <p>This section documents, in full and in plain language, a refinement made to the single most important input in the whole model — how strong each league is — and, just as importantly, the lengths gone to in order to make that refinement <b>honest</b> rather than a number fitted to flatter the model. It is written transparently because the integrity of the method matters more than any individual result.</p>

    <p><b>What the pure vision is.</b> This model rates national squads using <i>context only</i>: which club a player is at, how that club finishes in its league, and how strong that league is — recency-weighted across four years. It deliberately ignores all individual statistics (goals, assists, minutes, xG, player ratings) and all market values. The point being tested is a real claim about the world: that a player's quality is visible in the <i>structure</i> of where they play, and that this structural signal can rival traditional and market-based models. The model puts Messi 24th in Argentina's pecking order and Ronaldo well down Portugal's — both correct by the method, both deliberately unflinching. That is the vision, and nothing in this refinement weakens it.</p>

    <p><b>The flaw that was found.</b> Tested against the 60 group-stage results, the model was <i>systematically under-confident on favourites</i>: when it rated a favourite at around 45%, those teams actually won about 68% of the time. Its rankings were right (it knew who was stronger) but it did not separate strong from weak teams <i>enough</i>. The cause was traced upstream to the league-strength weights, which were originally hand-estimated and too compressed — in particular, leagues such as Liga MX and MLS were rated far too weak relative to Europe.</p>

    <p><b>How it was nearly done the WRONG way — and the human who stopped it.</b> The obvious fix was to steepen the league weights until the model's error on the 60 games dropped. That was tried, and it "worked" — a fitted exponent cut the error sharply. <b>But this is fitting, and fitting is fraud in the mathematical sense:</b> tuning a parameter against the very games you then use to judge the model is circular, mathematically guaranteed to look too good, and fits noise rather than signal. During this work the assistant building the model repeatedly drifted toward this — at one point reverse-engineering a justification for a number <i>after</i> it had been picked from an error sweep, and more than once presenting a fitted result with more confidence than it deserved. The human directing the project caught this each time, explicitly called out the sycophancy and the motivated reasoning, and insisted — stubbornly and correctly — that no parameter be chosen by looking at the World Cup scoreboard. That insistence is the reason this section can be written honestly.</p>

    <p><b>How it was actually done (the legitimate way).</b> Instead of fitting, the league weights were rebuilt from an <i>independent, external, results-based source</i>: the <b>Opta Power Rankings</b>, which rate every club in the world 0–100 from match results (not from individual stats or reputation). Crucially, a mechanism was stated <i>in writing, before any test</i>: a national-team player is not a random club from his league — he is almost always at one of its <i>better</i> clubs (that is largely why he is an international). So the right measure of his league's strength is the <b>average of its top clubs</b>, not the average of the whole league, because a whole-league average is dragged down by mid-table clubs that internationals do not play for.</p>

    <p>This was then tested under strict pre-registration — the hypotheses were locked before results were examined, and the model was run as something that could fail:</p>
    <ul style="line-height:1.7">
      <li><b>Whole-league average (rejected).</b> Using Opta's all-clubs average — the naive choice — made the model <i>worse</i> (it is flatter still). This was predicted in advance and reported honestly rather than buried. Its failure is positive evidence that whole-league average is the wrong statistic.</li>
      <li><b>Top-club environment (adopted).</b> Using Opta's top-club average made the model <i>better</i>, and — importantly — it was <b>robust</b>: it improved the model at every reasonable setting tested, not just one lucky one. The improvement is concentrated exactly where the mechanism predicts: teams whose players come from leagues the old weights underrated (most clearly Mexico, whose players are largely in Liga MX, and who won all three group games).</li>
    </ul>

    <p><b>Why this counts as refinement, not a different model.</b> The architecture is unchanged. The forbidden inputs are still forbidden — not a single individual statistic, rating, or market value enters anywhere. The three modes, the formula, the recency weighting: all identical. The <i>only</i> thing that changed is that one input — league strength — is now <i>measured</i> from an independent results-based source with a stated mechanism, instead of being estimated by hand. The model's central claim is therefore <i>stronger</i> after this change, not weaker: it now says "I rate squads using externally-measured league strength and club context, and nothing else."</p>

    <p><b>The honest size of it.</b> The legitimate improvement is <i>small</i> — a fraction of what the fitted version falsely promised. That is exactly as it should be: the fitted version looked better precisely because it was cheating. A small, real, externally-grounded gain is worth more than a large, fitted illusion. The group-stage results are treated as <i>suggestive only</i>. There is one World Cup every four years and no second control group, so the genuine out-of-sample test is the knockout stage — games the model has never seen. A pre-registered "wider-gap" challenger has been frozen alongside this one, and the knockouts will adjudicate between them on data neither was fitted to.</p>

    <p style="color:var(--gold)">In short: a real flaw was found, an obvious but fraudulent fix was refused, an independent source and a stated mechanism were used instead, the failing hypothesis was reported alongside the winning one, and the whole thing was kept faithful to a method that still uses zero individual statistics. The discipline <i>is</i> the result.</p>
  </div>
  <div class="msect"><h3>🔬 SCIENTIFIC METHOD, DATA COLLECTION & THE FULL CALIBRATION INVESTIGATION (v5.9.0)</h3>

    <p>This is the most important section in the model's documentation. It records, in full and without flattery, how the model was stress-tested against reality, what was tried, what failed, what survived, and — critically — the strict line that was held between <b>calibration</b> (legitimate, truth-seeking) and <b>fitting</b> (tuning parameters to the scoreboard, which is fraud). It is written so that a sceptical reader can audit not just the model but the <i>discipline</i> behind it.</p>

    <h4 style="color:var(--gold);margin-top:18px">1. The governing principle: calibration vs fitting</h4>
    <p>There is exactly one rule that separates honest model refinement from self-deception, and everything below obeys it:</p>
    <p style="padding-left:16px;border-left:3px solid var(--gold)"><b>A parameter is legitimate only if its value comes from an external source or a stated mechanism, decided BEFORE looking at how it scores against actual results. The moment a value is chosen because it lowers the error on the games being predicted, the result is circular and worthless — it fits noise and is guaranteed to look better than it is.</b></p>
    <p>Football makes this unusually hard. There is one World Cup every four years. There is no replication cohort, no second control arm, no way to re-run the tournament. So the method borrowed here is the epistemics of <b>pre-registration</b> and <b>out-of-sample testing</b> from clinical research: every hypothesis was written down with its justification <i>before</i> being tested; all results were reported, winners and losers alike; the 60 group-stage games were treated as <i>suggestive only</i>; and the knockout stage is held back as the single genuine out-of-sample test. Where a value could be sourced from independent data (Opta) or a referenced constant (the Elo curve), it was. Where it could only be obtained by tuning against the 60 games, it was <i>rejected on principle</i> even when it produced a better number.</p>

    <h4 style="color:var(--gold);margin-top:18px">2. Data collection sample</h4>
    <p>The model rests on two independently collected datasets, both gathered under a strict no-individual-statistics constraint:</p>
    <ul style="line-height:1.7">
      <li><b>Squad competitive-context dataset</b> — 48 national squads, 1,248 roster slots, 1,534 player records, 6,090 club-season "stints". For each player: every club across the 2022-2026 cycle, the duration in days, the league and that season's final position and league size, and any parallel continental competition with the club's progress. Sources used for <i>calendar facts only</i> (which club, when, which competitions): Transfermarkt, FBref, Wikipedia, official competition sites. Overall confidence: 93.5% high-or-medium. <b>Never collected:</b> goals, assists, xG, minutes-as-quality, player ratings, market values, or any external player ranking.</li>
      <li><b>Opta club-strength dataset</b> — the full Opta Power Rankings global table: <b>13,447 clubs</b> across 183 countries and 400+ leagues, each a 0-100 results-based strength rating, pulled in a single extraction (2026-06-26 snapshot). Of the 963 distinct clubs that appear in any squad member's career, <b>951 (98.8%) matched an Opta rating</b>; the 12 unmatched are reserve/youth or sub-coverage lower-tier clubs. Duration-weighted stint coverage: <b>99.5%</b>. Again club-level only — no player data.</li>
    </ul>
    <p>The honest weak areas are documented elsewhere in this tab and in the coverage report: obscure-nation depth is thinner-sourced; ~1% of stints exceed 400 days (calendar-year leagues recorded as single stints); some 2025-26 facts were not final at the data cutoff. These were recorded conservatively with low confidence rather than guessed.</p>
    <p style="background:var(--card2);border-left:3px solid var(--gold);padding:10px 14px;margin:12px 0"><b style="color:var(--gold)">The scale of the investigation, in real numbers.</b> These conclusions did not come from a single test. The two datasets together comprise roughly <b>94,000 individual data points</b>: the squad dataset holds <b>1,516 verified player records</b> built from <b>6,035 club-season stints</b>, <b>2,775 parallel continental-competition records</b>, and <b>8,864 competition-share entries</b>; the Opta dataset is the full <b>13,447-club global table</b>. Against this, <b>114 distinct candidate model configurations</b> were each fully re-derived from the raw stints and scored against all 60 completed matches — every league-strength variant, every finish curve, every tenure and continental reshaping, the club-rating re-architecture, the Elo reconstruction, and the per-league Gini curves. Each single re-derivation performs about <b>8,800 weighted multiply-accumulate operations</b> (one per competition-share, per stint, per player) before a single probability is produced; across all 114 candidates the investigation ran on the order of <b>one million core calculations</b>. Crucially, this volume is <i>not</i> a virtue in itself — a thousand fitted tests would be worthless. The point is the opposite: this many honest, pre-specified, externally-anchored tests were run precisely so that the <i>rejections</i> (every steepening that only worked when tuned) could be distinguished from the one small refinement that survived on referenced grounds (H1). Volume in service of falsification, not in service of a better-looking number.</p>

    <h4 style="color:var(--gold);margin-top:18px">3. The investigation — every lever tested against reality</h4>
    <p>The model was found to be systematically <b>under-confident on favourites</b> (it rated favourites at ~45% who then won ~68%): its rankings were right but it did not separate strong from weak teams enough. The cause was traced upstream to the league-strength weights. What followed was a systematic search — <b>114 distinct candidate model configurations</b> in total — for the <i>upstream</i> cause, testing each candidate against the 60 completed group games on three metrics (Brier score, favourite-calibration error, and hit-rate). Every lever:</p>
    <ul style="line-height:1.7">
      <li><b>Tenure reshaping</b> (how career length maps to weight): negligible effect. Not the lever.</li>
      <li><b>Finish-quality curve</b> (convex, exponential): negligible on its own. Not the lever.</li>
      <li><b>Continental-weight reshaping:</b> negligible. Not the lever.</li>
      <li><b>League-strength (LDW) steepening:</b> the ONLY lever that mattered. Steepening the gap between strong and weak leagues materially improved calibration. This localised the problem precisely: the model's flaw lived in the league-strength scale, nowhere else.</li>
    </ul>
    <p>But <i>how</i> to steepen it is where calibration and fitting diverge, and this is the heart of the investigation:</p>

    <h4 style="color:var(--gold);margin-top:18px">4. What was REJECTED as fitting</h4>
    <ul style="line-height:1.7">
      <li><b>Tuned LDW exponent (LDW^2):</b> raising league weights to a power dropped Brier from 0.555 to 0.534 — but the exponent was chosen <i>because</i> it minimised error on the 60 games. Circular. Rejected, despite being the single biggest "improvement" found.</li>
      <li><b>Tuned win-curve constant (K) and joint K+exponent optima:</b> a sweep found "best" values near K=4.4. These fit noise in 60 games. Rejected.</li>
      <li><b>Finish × league-weakness interaction with tuned strength:</b> a mechanically sound idea — a bad finish in a weak league should be punished more — but its strength parameter dropped Brier monotonically the harder it was cranked, with no natural stopping point. That monotonic improvement <i>is</i> the fitting signature. The mechanism is real; the strength had no external anchor. Rejected as a tuned parameter. (See §6 for why this lever is also empirically near-inert.)</li>
      <li><b>Club-rating power transform with tuned exponent:</b> scoring players by their club's raw Opta rating raised to a power tuned for best Brier reached 0.536. Same fraud, different lever. Rejected.</li>
    </ul>
    <p>In every case the rejected version produced a <i>better headline number</i> than what was ultimately shipped. That is exactly the point: the fitted versions look better <i>because</i> they cheat. A small honest gain is worth more than a large fitted illusion.</p>

    <h4 style="color:var(--gold);margin-top:18px">5. What was ACCEPTED as calibration</h4>
    <p><b>H1 — Opta top-club league strength.</b> The hand-estimated league weights were replaced with values derived from an <i>independent, results-based external source</i> (Opta), using a mechanism stated before testing: a national-team player comes from the <i>top</i> of his league, not its mid-table, so the right proxy is the league's top-club average, not its whole-league average. Zero parameters tuned. This was tested under pre-registration against competing hypotheses:</p>
    <ul style="line-height:1.7">
      <li><b>Opta whole-league average (rejected):</b> the naive choice. Made the model <i>worse</i> (Brier 0.555→0.559) — predicted in advance, reported honestly. Its failure is positive evidence that whole-league average is the wrong statistic.</li>
      <li><b>Opta top-club average (accepted):</b> made the model <i>better</i> (0.555→0.552) and was <b>robust</b> — it beat the baseline at every win-curve setting tested, not just one lucky value. Hit-rate preserved. The gain concentrates exactly where the mechanism predicts: nations whose players come from leagues the old weights underrated (most clearly Mexico, whose Liga MX players were badly underrated; Mexico won all three group games).</li>
    </ul>
    <p>H1 is small (~0.5% Brier) precisely <i>because</i> it does not cheat. It is shipped as the live model.</p>

    <h4 style="color:var(--gold);margin-top:18px">6. The deepest test: is the "weak leagues should be far weaker" intuition right?</h4>
    <p>A persistent, reasonable intuition was pressed hard: surely finishing last in the world's weakest league is an exponentially worse signal than finishing last in a stronger league — a walkover. This deserved a referenced answer, not a brush-off. Three independent, non-fitted tests were run:</p>
    <ul style="line-height:1.7">
      <li><b>Direct club-rating architecture (rejected, worse):</b> scoring each player by his actual club's Opta rating — retiring the league abstraction entirely — produced Brier 0.61, far worse. Reason: Opta's 0-100 club scale is <i>compressed</i> (almost every professional club sits 70-100), so used directly it <i>separates teams less</i> than the league approach, not more. Granularity hurt.</li>
      <li><b>Referenced Elo reconstruction (rejected, worse):</b> Opta's ratings are themselves Elo-derived, then compressed to 0-100 via a power transform. The principled inverse — recover the underlying Elo scale and apply the <i>referenced</i> Elo win-probability curve (the canonical 400-point logistic used by FIFA and chess) — was built. Solving the reconstruction exponent from Opta's own published scale anchors (mid-Premier-League clubs at ~875 on a ~0-1000 underlying scale) gave an exponent of ~1.05 — meaning Opta's display is <i>already nearly linear</i> in the underlying Elo. There was almost no compression to undo. Brier 0.59, worse than H1. The only way to make it win was to abandon the referenced exponent and tune one — i.e. to cheat.</li>
      <li><b>Full referenced cross-league gaps (rejected, worse):</b> the complete top-club strength of every league was measured from all 13,447 Opta clubs — the actual "matches played" yardstick, since Opta's Elo is built from every cross-league result ever recorded. Verdict: the gaps between the <i>top clubs</i> of leagues are <b>gentle</b>, not steep (Scottish, Danish, Saudi top clubs sit ~0.83-0.87 of the Premier League's). Using these full referenced values gave Brier 0.565 — worse than H1.</li>
    </ul>
    <p><b>The reconciliation (a genuine finding).</b> The intuition is correct — for <i>bottom</i> clubs in weak leagues. A bottom-tier club in a weak league truly would be a walkover against an elite side. But the squad data shows <b>World Cup players almost never come from those clubs</b>: of all scoring weight, players in weak leagues sit 39% at <i>top-finishing</i> clubs and only ~4% at bottom-finishing ones. They are the cream of their leagues. And the <i>top</i> clubs of different leagues are genuinely close in strength, because elite clubs everywhere buy good players and compete continentally. <b>The steepness the intuition senses is real, but it lives at the bottom of leagues — a population this tournament's squads essentially do not contain.</b> Three independent referenced measurements converge on the same conclusion: the relevant gaps are gentle, and only fitting produces steepness. This was not an oversight corrected late; it was a hypothesis tested rigorously and found to apply to a population outside the data.</p>

    <h4 style="color:var(--gold);margin-top:18px">7. A thesis, offered honestly — not a finding</h4>
    <p>This model can be read as a <b>thesis</b>: that the league-strength gaps relevant to <i>international tournament outcomes</i> might differ from those implied by club-rating systems, because a club's rating is shaped by money, squad depth, and system in ways that do not fully transfer to the individual players a national team extracts. There is a real, stateable mechanism here, and it is worth putting forward.</p>
    <p>But intellectual honesty requires the strongest possible statement of the opposite case, so here it is plainly: <b>on the evidence gathered so far, this thesis is NOT supported — it is contradicted.</b> Every time the data appeared to "want" gaps steeper than Opta's, that steepness emerged <i>only</i> from fitting an exponent to the 60 games. When Opta's figures were used as referenced — the honest way — they were gentle, and they <i>outperformed</i> the steeper fitted alternatives on calibration and hit-rate. So the current state of evidence leans <i>against</i> the idea that Opta is skewed, and toward the idea that Opta is approximately right and the steepening was overfitting.</p>
    <p>The thesis therefore stands as a <b>falsifiable hypothesis awaiting its only real test: the knockout stage</b> — matches the model has never seen. A challenger version with steeper gaps has been pre-registered against the Opta-faithful model. If the steeper version genuinely beats the Opta-faithful one out-of-sample, across the knockouts, that would be real evidence worth reporting. If it does not, the Opta-faithful model was right and the intuition, though sound for bottom-of-league clubs, does not transfer. Either way, the data decides — not the author's hope. <i>A thesis that its own author has honestly tried to destroy, and reported the damage, is the only kind worth trusting.</i></p>

    <h4 style="color:var(--gold);margin-top:18px">8. The within-league finish curve — tested per-league against peer-reviewed data</h4>
    <p>A final, reasonable challenge: finishing 5th in a strong league should be non-linearly worse than finishing 1st — the quality drop near the top of a table is surely steeper than in mid-table. And crucially, since the model spans dozens of leagues, each would need its <i>own</i> curve from its <i>own</i> reference; one shape cannot be extrapolated across all of them. This was pursued rigorously rather than dismissed.</p>
    <p><b>The referenced source:</b> peer-reviewed competitive-balance research (the talent-concentration literature) measures the <b>Gini coefficient of points concentration</b> for individual leagues — a respected, published quantity capturing exactly how steep or flat each league's table is. The data shows real per-league differences: Portugal's Primeira Liga is the least balanced of the major leagues (Gini ≈ 0.20, a steep table), France's Ligue 1 the most balanced (Gini ≈ 0.15, a flat table), with the others between. Critically, the same research finds <b>lower and weaker divisions are MORE balanced (flatter), not steeper</b> — the opposite of the steepening intuition once again.</p>
    <p><b>What was built:</b> each league with a referenced Gini was given its own finish-curve exponent, interpolated so the steepest measured league receives a mild convex curve and the flattest stays linear — anchored to the published balance figures, not tuned to World Cup results. Every league <i>without</i> a clean referenced Gini was left strictly <b>linear</b> (no extrapolation). About ten leagues received a referenced exponent; the rest stayed linear.</p>
    <p><b>The result:</b> this per-league, peer-reviewed-anchored finish curve changed the model's Brier by <b>0.0002</b> and altered the predicted outcome of <b>zero of the 60 games</b>. It was therefore <i>not</i> adopted.</p>
    <p><b>Honest critique of the implementation</b> (because the reasoning matters more than the result): the approach is <i>defensible</i> — the per-league shapes come from peer-reviewed data, the direction is empirically correct, and the linear-where-unsourced rule prevents extrapolation. But it has one genuinely unrigorous step: the Gini coefficient measures inequality of the <i>whole</i> points distribution, and converting it into the <i>exponent of a position-to-quality curve</i> involves an inferential leap that is reasonable but not derived. Combined with a literally null effect on predictions, adopting it would add a soft-anchored parameter to a model whose credibility rests on clean sourcing — making it <i>less</i> rigorous, not more, in exchange for nothing measurable.</p>
    <p style="color:var(--gold)"><b>Conclusion:</b> the finish curve stays <b>linear</b> — not by laziness or assumption, but as the demonstrated least-assumption default. Across heterogeneous leagues whose true curves differ and cannot all be cleanly sourced, and given that even a carefully referenced per-league curve changes no predictions, linear is the honest choice. This is the recurring lesson of the whole investigation, seen one final time: at the squad-aggregate level, reshaping any single within-player curve is near-inert, because a national team's score is a sum over fifteen players whose individual context-quirks average out. The levers that genuinely move the model are the ones that change the <i>relative separation between whole squads</i> — which is why externally-sourced league strength (H1) mattered and finish-curve reshaping did not.</p>

    <p style="color:var(--mut);margin-top:14px;font-size:0.95em">Methodological note: this is the <i>epistemics</i> of evidence synthesis and pre-registration applied to a football model — consistency-checking between sources, localising where a discrepancy lives, sensitivity analysis across parameters, and holding out a genuine test set. It is not formal statistical machinery, and it is not presented as such. The discipline is the part that matters: refusing to let the scoreboard choose the parameters, and reporting every result rather than only the flattering ones.</p>
  </div>

    <p style="font-size:0.86em;color:var(--dim);margin-top:10px">Note on magnitude: the Opta corrections changed individual league weights by large amounts (+36% to +108%), producing large ranking redistributions, even though the <i>average</i> group-stage Brier moved only slightly. Aggregate error over many games is a blunt measure — it can hide substantial movement for individual teams and specific matchups, which is exactly what matters for a knockout bracket. Small average changes genuinely do aggregate into large per-team shifts; this ledger exists so those shifts are visible rather than buried.</p>

    <h3>STEP 3 — MULTI-LEAGUE TRANSFERS</h3>
    <p>A player who featured in two or more leagues in the last 12 months (e.g. a January transfer) gets a blended score, weighted across both stints, rather than only their current club. Single-club players — the large majority — are unaffected. Full-season loans (a player at one club all season) count once at that club.</p></div>
  <div class="msect"><h3>STEP 4 — WIN PROBABILITY</h3>
    <div class="fbox">r = ScoreA / ScoreB
x = ln(r) × 1.5
P(WinA) = σ(x) × (1 − pD)
P(Draw) = 0.28 × e^(−0.30 × |x|)</div>
    <p>Log-ratio maps the strength gap to a win chance; draw probability decays as the gap widens. Equal strength → 36% / 28% / 36%.</p></div>
  <div class="msect"><h3>BETTING VIEW — PURE MODEL, NO OUTSIDE INPUTS</h3>
    <p>The betting suggestions are derived <b>only</b> from this model's three outputs — P(win A), P(draw), P(win B) — and the strength ratio behind them. Nothing about form, injuries, suspensions, motivation, or goals is added. This is deliberate: the squad-strength view is expressed cleanly in betting terms, using only the model's own numbers.</p>
    <p>Only markets that follow directly from those three numbers are shown — Match Result, Double Chance, Draw No Bet, and Team to Win — each with the fair (break-even) odds the model implies. Goals-based markets (over/under, both-teams-to-score, correct score) are deliberately excluded, because squad-strength gives no honest opinion on goals. Each matchup shows a <b style="color:var(--grn)">Most Reliable</b> option (high hit-rate) and a <b style="color:var(--amb)">Most Profitable</b> option (bigger payout); you can select any combination of lines and the stake splits across them, with an optional rand converter.</p>
    <p>The fair odds shown are derived purely from the model's own probabilities (a 50% chance implies fair odds of 2.00). This tool deliberately never reads any bookmaker's odds — it works only from the model's own numbers, expressing the squad-strength view in betting terms rather than chasing market prices.</p>
    <p>The knockout bracket is deterministic: at every stage the side with the higher model score advances, with no randomness. Group order and the eight best third-placed teams resolve the same way, following the official FIFA 2026 Round-of-32 structure. Switching the calculation basis is therefore what reveals alternative outcomes — Starting XI, Top 15 and Whole Squad can each crown a different champion. The Fixtures tab is a separate, read-only layer and never affects this simulation.</p></div>
  <div class="msect"><h3>KNOCKOUT SIMULATION (BRACKET TAB)</h3>
    <p>The bracket is a deterministic forecast: at every stage the team with the higher model score advances, with no randomness. Group order and the eight best third-placed teams resolve the same way, and the bracket follows the official FIFA 2026 Round-of-32 structure. Because it is deterministic, switching the calculation basis is what surfaces alternative outcomes — Starting XI, Top 15 and Whole Squad can each crown a different champion. The Fixtures tab is a separate, read-only layer and never feeds back into this simulation. The bracket is clearly a prediction, shown so the model's accuracy can be weighed against real results.</p></div>
  <div class="msect"><h3>LEAGUE WEIGHTS — ${Object.keys(L).length} leagues</h3>
    <div style="background:var(--card2);border:1px solid #22C55E55;border-radius:9px;padding:12px 14px;margin-bottom:12px;font-size:11px;line-height:1.65;color:var(--mut)">
      <div style="font-weight:800;color:#22C55E;letter-spacing:.5px;margin-bottom:6px">📊 HOW THESE WEIGHTS ARE DERIVED — DATA SOURCES</div>
      <p style="margin:0 0 8px"><b style="color:var(--text)">Primary source: Opta Power Rankings</b> (Stats Perform / The Analyst). The Premier League anchors the scale at LDW = 1.00; every other league is scaled from Opta's published 0–100 league-strength ratings using a floor-anchored linear conversion. Opta rates 15,000+ clubs worldwide on match-event performance, then averages by league — the most reputable data-driven measure of league strength, and crucially it covers non-European leagues (Saudi Pro League, MLS, Brazil, Liga MX, etc.) that UEFA coefficients ignore.</p>
      <p style="margin:0 0 8px"><b style="color:var(--text)">Why a single source, not a blend:</b> the main alternative (UEFA coefficients) only covers European leagues and measures continental cup results rather than league strength directly — blending it in would create gaps and inconsistency for a World Cup with players from 60+ leagues. A single high-quality source beats a muddled combination here. (Confidence in this choice: high.)</p>
      <p style="margin:0 0 8px"><b style="color:var(--text)">Two separate time windows (important):</b> the model uses time in two distinct ways, and they should not be confused. <b>(1) Player scoring is multi-year and recency-weighted:</b> each player's career is split into per-season club stints across the four-year cycle (2022-23 weighted 0.70, 2023-24 0.85, 2024-25 and 2025-26 1.00), and each stint uses <i>that season's</i> club, league, and final league position. So a player's score genuinely reflects several years of context with older seasons counting less. <b>(2) League strength (the LDW) is a single current snapshot:</b> the Opta Power Rankings publish one current strength figure per league, not a per-season history, so that single figure is applied to all of a player's stints regardless of season.</p>
      <p style="margin:0 0 8px"><b style="color:var(--text)">Honest limitation of this:</b> applying a single current league-strength figure to a 2022-23 stint is a mild anachronism — if a league's strength drifted over the cycle, the current snapshot is an approximation for the older stints (about 42% of total scoring weight sits in the two older seasons). Opta publishes no clean per-season league-strength history, and fabricating one was refused, so the current snapshot is used throughout and this approximation is accepted openly rather than hidden. The Opta snapshot was pulled on <b>26 Jun 2026</b>.</p>
      <p style="margin:0 0 8px"><b style="color:var(--text)">Leagues Opta covers (v6.0.0 — now 25):</b> the Opta top-club method now sets the weights for <b>25 leagues</b> — the 12 from v5.8 (major European plus Liga MX, MLS, Brazilian, Argentine, Belgian, Eredivisie, Primeira) and 13 more added in v6.0 (Scottish, Greek, Czech, Norwegian, Swiss, Turkish, Saudi, Colombian, Danish, Croatian, Japanese, Swedish, English Championship). The old hand-estimates for those 13 were wrong by +36% to +108% versus Opta, so they were replaced for consistency with the same referenced source. Only genuinely sub-coverage divisions (e.g. Qatari, Jordanian, Curaçaoan top flights, where Opta lacks depth) retain conservative hand-estimates, flagged as such and sitting below the Opta-sourced set. See the ranking-change ledger above for the hallmark shifts this produced.</p>
      <p style="margin:0;font-size:10px;color:var(--dim)">The model remains pure throughout — league strength and club placement only, never individual player statistics, market values, or ratings.</p>
    </div>
    <div style="background:var(--card2);border:1px solid #3B82F655;border-radius:9px;padding:12px 14px;margin-bottom:12px;font-size:11px;line-height:1.65;color:var(--mut)">
      <div style="font-weight:800;color:#3B82F6;letter-spacing:.5px;margin-bottom:6px">🌍 CONTINENTAL COMPETITION ENRICHMENT</div>
      <p style="margin:0 0 8px">A player's club context isn't only its domestic league. Clubs that also competed in a <b style="color:var(--text)">continental competition</b> — the UEFA Champions League, Europa League, Conference League, Copa Libertadores, and the Asian/CONCACAF/African equivalents — played in a second, often stronger arena. The model now folds that in as an extra context node, exactly in the spirit of the network approach: more of the real competitive web is included.</p>
      <p style="margin:0 0 8px">Each continental competition has its own strength weight, parallel to a domestic league's. The <b style="color:var(--text)">Champions League is rated above the Premier League anchor (1.15)</b> — it is the strongest club competition in the world. How far a club progressed (winner → final → semi → quarter → last-16 → league-phase exit) acts like a "finish" within that competition's field.</p>
      <p style="margin:0 0 8px">It is blended <b style="color:var(--text)">time-weighted</b> (a continental campaign is a minority of a club's matches, so it enriches rather than dominates the domestic signal) and only for clubs that actually competed continentally — domestic-only players are unaffected, which is correct, not a gap.</p>
      <p style="margin:0;font-size:10px;color:var(--dim)">Coverage: 2024-25 UEFA competitions and 2024 Copa Libertadores participants are included. A future update will refine this per player using exact days/months spent at each club. Still pure — competition strength and club standing only, never individual stats.</p>
    </div>
    <p style="margin-bottom:9px">Score columns = player score for finishing 1st / 3rd / 5th / 10th.</p>
    <div style="overflow-x:auto"><table class="ldw-table"><thead><tr><th>League</th><th>Country</th><th>LDW</th><th>Teams</th><th>1st</th><th>3rd</th><th>5th</th><th>10th</th></tr></thead><tbody>${lRows}</tbody></table></div></div>
  <div class="msect"><h3>DATA & LIMITATIONS</h3>
    <ul><li>Squads: official FIFA 26-man lists (June 2026), corrected against confirmed probable XIs and actual tournament line-ups</li>
    <li>Final standings: confirmed for all Big-5 leagues + Saudi Pro League (2025-26)</li>
    <li>* = estimated finishing position where not yet confirmed (mostly lower-ranked nations)</li>
    <li>The model captures league/club context, not form, fitness, tactics or matchups. Real outcomes will differ.</li></ul></div>
    <div class="msect"><h3>🥇 HOW WE COMPARE TO THE BETTING MARKET (an honest note)</h3>
    <p>This comparison was added <b>later</b>, well after the model was already built and live. The idea: a model is only as impressive as the benchmark it is measured against, and the sharpest benchmark in football is the betting market - so we test our probabilities against it, game by game, both scored by Brier.</p>
    <p>We wanted to use a single gold-standard source (the kind of prediction-market price that serious forecasters respect). <b>That turned out to be impossible to gather honestly for past games.</b> Prediction markets like Polymarket, and the sharpest bookmaker (Pinnacle), hide their historical pre-match prices behind live JavaScript - there is no reliable way to retrieve "what the price was at kickoff" for a game already played. Inventing or approximating those numbers would betray the entire point of this model, which only ever uses verifiable facts.</p>
    <p>So we compensated as transparently as we could:</p>
    <ul>
      <li><b>Every past game uses cross-verified pre-match odds</b> from mainstream bookmakers (FanDuel, CBS, Fox and similar), checked across more than one source where possible.</li>
      <li><b>The source is shown on every single game</b> in the Results tab - no number appears without saying where it came from.</li>
      <li><b>Odds are converted fairly:</b> American odds to implied probability, then de-vigged (the bookmaker's built-in margin removed so the three outcomes sum to 100%). This is the honest way to compare - it grades the market at its true opinion, not its padded one.</li>
      <li><b>Coverage is now complete for the group stage.</b> Every played game has cross-verified pre-match odds attached, with the source shown. Knockout games will be added the same way as they are played.</li>
      <li><b>Going forward</b>, pre-match market odds for upcoming games are captured cleanly at the time of each update, so this comparison becomes sharper and more decisive through the knockout rounds.</li>
    </ul>
    <p style="color:var(--gold)">What the full group-stage sample shows: across all played games the betting market is still ahead overall (its mean Brier is a little lower than ours), which is expected - the market is razor-sharp on the many one-sided favourite games. But the model wins a meaningful share of games outright, and they are almost all the same type: the draws and the upsets where the market was overconfident on a favourite. That is exactly the behaviour this model was built for - it gives realistic credit to sides the market dismisses. So the market edges the average, but the model has a real, demonstrable edge on the specific games that matter most for spotting value.</p>
    </div>
    <div class="msect"><h3>📋 CHANGELOG — BUILD HISTORY</h3>
    <p style="font-size:11px;color:var(--mut);margin-bottom:10px">Every build's fixes and additions, newest first. Real-world results are refreshed and baked in on each build.</p>

}
