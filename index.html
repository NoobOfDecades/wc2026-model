<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WC 2026 · Squad Strength Model · 48 Teams</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07111A;--card:#0D1B29;--card2:#112035;--bdr:#1A2E42;--gold:#C89B3C;--gdim:#7B5B1A;--text:#E8EEF4;--mut:#6B8299;--dim:#2A3F54;--grn:#22C55E;--amb:#F97316;--red:#EF4444}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:50px}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
a{color:inherit;text-decoration:none}
.hdr{background:linear-gradient(180deg,#040D14,var(--card));border-bottom:2px solid var(--bdr);padding:0 16px;position:sticky;top:0;z-index:50}
.hdr-i{max-width:1320px;margin:0 auto}
.brand{display:flex;align-items:center;gap:12px;padding:11px 0 8px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--gold);background:rgba(200,155,60,.12);border:1px solid rgba(200,155,60,.3);padding:3px 8px;border-radius:3px}
.brand-title{font-size:16px;font-weight:800}
.brand-sub{font-size:10px;color:var(--mut);margin-top:1px}
.modewrap{margin-left:auto;display:flex;align-items:center;gap:10px}
.modelbl{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:.5px;text-align:right;line-height:1.3}
.toggle{display:flex;background:var(--card2);border:1px solid var(--bdr);border-radius:20px;padding:3px;gap:2px}
.toggle button{padding:5px 12px;font-size:11px;font-weight:700;border-radius:16px;color:var(--mut);transition:all .15s;white-space:nowrap}
.toggle button.on{background:var(--gold);color:#07111A}
.nav{display:flex;gap:2px;padding-top:6px;overflow-x:auto}
.nb{padding:7px 13px;font-size:12px;font-weight:500;color:var(--mut);border-radius:5px 5px 0 0;border-bottom:2px solid transparent;white-space:nowrap}
.nb:hover{color:var(--text)}
.nb.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
.content{max-width:1320px;margin:0 auto;padding:18px 16px}
.gtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.gtab{padding:6px 13px;border:1px solid var(--bdr);border-radius:20px;font-size:12px;color:var(--mut);transition:all .15s}
.gtab:hover{border-color:var(--gold);color:var(--gold)}
.gtab.on{background:var(--gold);color:#07111A;border-color:var(--gold);font-weight:700}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:13px}
.tcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:15px;cursor:pointer;transition:all .2s;border-top-width:3px}
.tcard:hover{transform:translateY(-2px);border-color:var(--gdim)}
.tcard-hdr{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.tflag{font-size:34px}
.tname{font-size:15px;font-weight:800}
.tmeta{font-size:10px;color:var(--mut);margin-top:1px}
.tscore{font-size:30px;font-weight:900;font-family:monospace}
.tscore-sub{font-size:10px;color:var(--mut);margin-top:1px}
.tbar{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin:9px 0 0}
.tbar-fill{height:100%;border-radius:3px}
.tstats{display:flex;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid var(--bdr)}
.tstat{flex:1}
.tslabel{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--mut);margin-bottom:3px}
.tsval{font-size:14px;font-weight:800;font-family:monospace}
.tperf{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:11px;padding-top:10px;border-top:1px solid var(--bdr)}
.tperf-lbl{font-size:9px;color:var(--mut);letter-spacing:.3px}
.tperf-pill{font-size:9px;font-weight:700;font-family:monospace;border:1px solid;border-radius:10px;padding:2px 8px}
.tperf-played{font-size:9px;color:var(--dim);margin-left:auto}
.ptb-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.ptb-team{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;font-weight:600}
.ptb-name{font-weight:700}
.ptb-games{font-size:9px;color:var(--dim)}
.ptb-na{font-size:9px;color:var(--dim);font-style:italic}
.crs-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:11px;margin:14px 0;overflow:hidden}
.crs-title{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);text-align:center;padding:11px;border-bottom:1px solid var(--bdr)}
.crs-box{border:1px solid;border-radius:8px;padding:7px 14px;min-width:120px}
.crs-box-lbl{font-size:8px;font-weight:700;letter-spacing:.8px;color:var(--mut)}
.crs-box-val{font-size:18px;font-weight:900;font-family:monospace;line-height:1.2}
.crs-box-sub{font-size:9px;color:var(--mut)}
.crs-foot{font-size:9px;color:var(--dim);padding:8px 12px;border-top:1px solid var(--bdr);line-height:1.5}
.tview-btn{width:100%;margin-top:11px;padding:7px;border:1px solid var(--bdr);border-radius:6px;font-size:11px;font-weight:600;color:var(--mut);transition:all .2s}
.tview-btn:hover{border-color:var(--gold);color:var(--gold)}
.sqtable{width:100%;border-collapse:collapse;font-size:12px}
.sqtable th{text-align:left;padding:8px 9px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--gold);border-bottom:2px solid rgba(200,155,60,.4);white-space:nowrap}
.sqtable td{padding:6px 9px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.sqtable tr:hover td{background:rgba(200,155,60,.04)}
.sqtable tr.starter td{background:rgba(34,197,94,.06)}
.sqtable tr.starter:hover td{background:rgba(34,197,94,.1)}
.sqtable tr.injured td{opacity:.5}
.pbadge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 5px;border-radius:3px;font-family:monospace}
.GK{background:#FEF3C7;color:#92400E}.DEF{background:#DBEAFE;color:#1E3A8A}.MID{background:#D1FAE5;color:#065F46}.FWD{background:#FEE2E2;color:#7F1D1D}
.xi-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--grn);margin-right:5px;vertical-align:middle}
.est{color:#F97316;font-size:9px}
.mono{font-family:monospace}
.csel{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.csel-grp{display:flex;flex-direction:column;gap:6px}
.csel-label{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1px}
.csel-btns{display:flex;gap:5px;flex-wrap:wrap;max-width:640px}
.csbtn{padding:5px 10px;border:1px solid var(--bdr);border-radius:16px;font-size:11px;color:var(--mut);transition:all .15s}
.csbtn:hover{border-color:var(--gdim);color:var(--text)}
.csbtn.on{font-weight:700}
.hero{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:16px}
.clabel{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--gold);text-align:center;margin-bottom:11px}
.cscores{display:flex;align-items:stretch;gap:12px}
.cscore-team{flex:1;text-align:center;padding:13px;border-radius:8px}
.cscore-flag{font-size:38px;margin-bottom:3px}
.cscore-name{font-size:13px;font-weight:800;margin-bottom:2px}
.cscore-big{font-size:38px;font-weight:900;font-family:monospace;line-height:1}
.cscore-sub{font-size:10px;color:var(--mut);margin-top:4px}
.cmid{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 6px}
.cratio-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--mut);text-align:center}
.cratio{font-size:21px;font-weight:900;font-family:monospace;color:var(--gold)}
.cbar{display:flex;height:15px;border-radius:8px;overflow:hidden;margin:9px 0}
.cbseg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.9)}
.pnums{display:flex;margin-top:4px}
.pnum{flex:1;text-align:center}
.pnum-pct{font-size:26px;font-weight:900;font-family:monospace}
.pnum-lbl{font-size:10px;color:var(--mut);margin-top:2px}
.odds-row{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.ocard{flex:1;min-width:90px;background:var(--card2);border:1px solid var(--bdr);border-radius:6px;padding:8px;text-align:center}
.ocard-t{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--mut);margin-bottom:4px}
.ocard-v{font-size:18px;font-weight:900;font-family:monospace}
.ocard-s{font-size:9px;color:var(--mut);margin-top:2px}
.cmodel-note{font-size:10px;color:var(--dim);text-align:center;margin-top:8px;line-height:1.6}
.bpanel{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:16px}
.bpanel-title{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--gold);margin-bottom:11px}
.bsugg{background:var(--card2);border:1px solid var(--bdr);border-radius:8px;padding:11px;margin-bottom:9px}
.bconf{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;margin-bottom:5px}
.ch{background:rgba(34,197,94,.15);color:var(--grn)}.cm{background:rgba(249,115,22,.15);color:var(--amb)}.cl{background:rgba(107,130,153,.2);color:var(--mut)}
.bcall{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:5px}
.brat{font-size:12px;color:var(--mut);line-height:1.6}
.disclaimer{font-size:10px;color:var(--dim);line-height:1.6;padding:10px;background:rgba(255,255,255,.02);border-radius:6px;border:1px solid var(--bdr);margin-top:11px}
.sg-legend{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--bdr);border-radius:8px;flex-wrap:wrap}
.sg-leg-team{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text)}
.sg-leg-team-r{flex-direction:row}
.sg-leg-dot{width:11px;height:11px;border-radius:3px;display:inline-block;flex-shrink:0}
.sg-leg-vs{font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:11px}
.sc-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--mut);margin-bottom:6px}
.sc-vals{display:flex;justify-content:space-between}
.sc-val{font-size:16px;font-weight:800;font-family:monospace}
.contrib{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr)}
.contrib:last-child{border:none}
.contrib-name{font-size:12px;font-weight:600}
.contrib-club{font-size:10px;color:var(--mut);margin-top:1px}
.contrib-score{font-size:15px;font-weight:800;font-family:monospace}
.lb-row{margin-bottom:6px}
.lb-hdr{display:flex;justify-content:space-between;margin-bottom:2px}
.lb-name{font-size:11px;color:var(--mut)}
.lb-val{font-size:11px;font-weight:700;font-family:monospace}
.lb-bar{height:4px;background:var(--bdr);border-radius:2px}
.lb-fill{height:100%;border-radius:2px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px}
.crd{background:var(--card);border:1px solid var(--bdr);border-radius:8px}
.crd-title{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:10px 14px;border-bottom:1px solid var(--bdr)}
.crd-body{padding:12px 14px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;color:var(--mut);margin-bottom:16px;transition:all .15s}
.back-btn:hover{border-color:var(--gdim);color:var(--text)}
.sect-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:11px}
.info-box{background:var(--card2);border:1px solid var(--bdr);border-radius:8px;margin-bottom:12px;overflow:hidden}
.info-box summary{cursor:pointer;padding:10px 13px;font-size:11px;font-weight:600;color:var(--gold);list-style:none}
.info-box summary::-webkit-details-marker{display:none}
.info-box[open] summary{border-bottom:1px solid var(--bdr)}
.info-body{padding:11px 13px;font-size:11px;line-height:1.65;color:var(--mut)}
.info-body p{margin:0 0 9px}
.info-body p:last-child{margin-bottom:0}
.info-body b{color:var(--text)}
.msect{margin-bottom:22px}
.msect h3{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:9px;letter-spacing:.5px}
.msect p,.msect li{font-size:13px;color:var(--mut);line-height:1.8}
.msect ul{padding-left:20px}
.fbox{background:var(--card2);border:1px solid var(--bdr);border-left:3px solid var(--gold);border-radius:6px;padding:13px;font-family:monospace;font-size:13px;margin:9px 0;white-space:pre-wrap}
.ldw-table{width:100%;border-collapse:collapse;font-size:11px}
.ldw-table th{text-align:left;padding:6px 8px;color:var(--gold);font-size:10px;font-weight:700;border-bottom:1px solid var(--bdr)}
.ldw-table td{padding:5px 8px;border-bottom:1px solid rgba(26,46,66,.6)}
.rank-table{width:100%;border-collapse:collapse;font-size:12px}
.rank-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--gold);border-bottom:2px solid rgba(200,155,60,.4)}
.rank-table td{padding:7px 10px;border-bottom:1px solid var(--bdr)}
.rank-table tr:hover td{background:rgba(200,155,60,.04)}
.mini-bar{display:inline-block;width:80px;height:5px;background:var(--bdr);border-radius:2px;overflow:hidden;vertical-align:middle;margin-left:6px}
.mini-fill{height:100%;border-radius:2px}
.delta-up{color:var(--grn);font-size:10px}.delta-dn{color:var(--red);font-size:10px}.delta-eq{color:var(--dim);font-size:10px}
.footer{max-width:1320px;margin:20px auto 0;padding:12px 16px;border-top:1px solid var(--bdr);font-size:10px;color:var(--dim);text-align:center;line-height:1.7}
/* ── betting engine ── */
.bverdict{font-size:13px;line-height:1.7;color:var(--text);background:var(--card2);border-left:3px solid var(--gold);border-radius:6px;padding:11px 13px;margin-bottom:13px}
.bankroll-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:8px}
.bankroll-lbl{font-size:11px;color:var(--mut);font-weight:600}
.bankroll-in{width:110px;padding:7px 10px;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--text);font-size:14px;font-family:monospace}
.bankroll-in:focus{outline:none;border-color:var(--gold)}
.bankroll-note{font-size:10px;color:var(--gold);font-weight:600}
.bblocks{display:grid;grid-template-columns:1fr auto 1fr;gap:11px;align-items:stretch}
.bblock{border:1px solid var(--bdr);border-radius:9px;padding:12px;background:var(--card2)}
.bor{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.bor-line{width:1px;flex:1;background:linear-gradient(var(--bdr),var(--gdim),var(--bdr))}
.bor-txt{font-size:9.5px;font-weight:900;letter-spacing:.5px;color:var(--gold);background:var(--card);border:1px solid var(--gdim);border-radius:14px;padding:5px 11px;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px}
.bblock-safe{border-top:3px solid var(--grn)}
.bblock-risk{border-top:3px solid var(--amb)}
.bblock-hdr{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:1px;margin-bottom:4px}
.bblock-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.bblock-share{margin-left:auto;font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.5px}
.bblock-sub{font-size:10px;color:var(--mut);line-height:1.5;margin-bottom:10px}
.bline{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:10px;margin-bottom:8px}
.bline:last-child{margin-bottom:0}
.bline-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.bline-mkt{font-size:12px;font-weight:800;color:var(--text);line-height:1.3}
.bline-odds{text-align:right;font-size:17px;font-weight:900;font-family:monospace;color:var(--gold);line-height:1;white-space:nowrap}
.bline-oddlbl{display:block;font-size:8px;font-weight:600;color:var(--mut);letter-spacing:.5px;margin-top:1px}
.bline-sporty{font-size:10px;color:#60A5FA;background:rgba(96,165,250,.08);border-radius:4px;padding:4px 7px;margin-bottom:6px;font-family:monospace}
.bline-plain{font-size:11px;color:var(--mut);line-height:1.6;margin-bottom:7px}
.bline-stake{display:flex;justify-content:space-between;align-items:center;gap:8px;border-top:1px solid var(--bdr);padding-top:6px;flex-wrap:wrap}
.bline-prob{font-size:10px;font-weight:700;color:var(--text);font-family:monospace}
.bline-split{font-size:10px;color:var(--mut)}
.stake-rand{font-weight:800;color:var(--grn);font-family:monospace}
/* ── quick picks ── */
.qpick-wrap{margin-bottom:14px}
.qpick-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-bottom:7px}
.qpick-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px}
.qpick{flex-shrink:0;display:flex;flex-direction:column;gap:2px;padding:8px 12px;background:var(--card2);border:1px solid var(--bdr);border-radius:8px;text-align:left;transition:all .15s}
.qpick:hover{border-color:var(--gdim)}
.qpick.on{border-color:var(--gold);background:rgba(200,155,60,.1)}
.qpick-when{font-size:9px;font-weight:700;color:var(--amb);letter-spacing:.5px}
.qpick-teams{font-size:12px;font-weight:600;white-space:nowrap}
/* ── fixtures tab ── */
.fxtabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fxtab{padding:7px 14px;border:1px solid var(--bdr);border-radius:18px;font-size:12px;color:var(--mut);font-weight:600;transition:all .15s}
.fxtab:hover{border-color:var(--gdim);color:var(--text)}
.fxtab.on{background:var(--gold);color:#07111A;border-color:var(--gold);font-weight:700}
.fxcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;margin-bottom:9px;overflow:hidden}
.fxcard-done{opacity:.72}
.fxcard-live{border-color:#EF4444;box-shadow:0 0 0 1px rgba(239,68,68,.35),0 4px 18px rgba(239,68,68,.12)}
.fxc-head-live{background:rgba(239,68,68,.05)}
.fxc-livebadge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:1.5px;color:#EF4444}
.fxc-livedot{width:8px;height:8px;border-radius:50%;background:#EF4444;animation:livepulse 1.4s ease-in-out infinite}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.fxc-livenote{margin-top:8px;font-size:10px;color:#FCA5A5;background:rgba(239,68,68,.08);border-radius:5px;padding:5px 9px;text-align:center;font-weight:600}
.fxc-head{padding:12px 14px;cursor:pointer;transition:background .15s}
.fxc-head:hover{background:rgba(200,155,60,.04)}
.fxc-meta{display:flex;justify-content:space-between;margin-bottom:8px}
.fxc-grp{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--gold)}
.fxc-when{font-size:10px;color:var(--mut);font-weight:600}
.fxc-teams{display:flex;align-items:center;gap:10px}
.fxc-side{flex:1;display:flex;align-items:center;gap:9px}
.fxc-side-r{justify-content:flex-end}
.fxc-fl{font-size:26px}
.fxc-nm{font-size:14px;font-weight:700}
.fxc-vs{padding:0 4px}
.fxc-v{font-size:12px;color:var(--mut);font-weight:700}
.fxc-score{font-size:18px;font-weight:900;font-family:monospace;color:var(--text)}
.fxc-pending{font-size:10px;font-weight:700;color:var(--mut);text-align:center;line-height:1.2;letter-spacing:.3px}
.fxc-pendingnote{color:var(--amb)!important}
.fxc-cta{margin-top:9px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--gold);text-align:center}
.fxc-ft{color:var(--mut)}
.fxc-body{padding:0 14px 14px;border-top:1px solid var(--bdr)}

  const lg=L[p[3]];if(!lg)return 0;
  const domestic=fps(p[4],lg.s)*lg.w;
  // PHASE 2a enrichment: if the club also played a continental competition, blend that context in,
  // time-weighted (continental ≈ CONT_TIME_SHARE of club-time). Enriches, never replaces, domestic.
  const cont=contContext(p[2]);
  if(cont===null)return domestic;
  return domestic*(1-CONT_TIME_SHARE)+cont*CONT_TIME_SHARE;
}
function pscore(p,teamKey){
  if(p[7])return 0; // injured → unavailable
  // BUILD RUN 2: player score is pre-computed from full per-player competitive context
  // (every club stint × league strength × club finish × continental competition, weighted by
  // time-at-club for sequential moves and competition-share for parallel comps, recency-weighted).
  // Embedded as element [8]. This replaces the live fps×LDW + flat continental approximation.
  return p[8]!==undefined?p[8]:rawScore(p);
}
// Build likely XI (position-aware auto-fill, excludes injured)
function buildXI(teamKey){
  const players=S[teamKey].players;
  const avail=players.filter(p=>!p[7]);
  let flagged=avail.filter(p=>p[6]);
  // enforce exactly one GK among flagged starters (keep highest-scoring GK, demote extras)
  const fgks=flagged.filter(p=>p[1]==='GK').sort((a,b)=>pscore(b,teamKey)-pscore(a,teamKey));
  if(fgks.length>1){const keep=fgks[0];flagged=flagged.filter(p=>p[1]!=='GK'||p===keep);}
  let xi=flagged.slice();
  if(xi.length>11){
    // trim to 11 but never drop the only GK
    const gk=xi.find(p=>p[1]==='GK');
    let outfield=xi.filter(p=>p!==gk).map(p=>[p,pscore(p,teamKey)]).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
    xi=gk?[gk,...outfield].slice(0,11):outfield.slice(0,11);
    return xi;
  }
  let need=11-xi.length;
  const inXI=new Set(xi);
  const have={GK:0,DEF:0,MID:0,FWD:0};
  xi.forEach(p=>have[p[1]]++);
  const pool=avail.filter(p=>!inXI.has(p)).map(p=>[p,pscore(p,teamKey)]).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  for(const[pos,t]of FORMATION){
    while(have[pos]<t&&need>0){
      const c=pool.find(p=>p[1]===pos&&!inXI.has(p));
      if(!c)break;
      xi.push(c);inXI.add(c);have[pos]++;need--;
    }
  }
  while(need>0){
    let c=pool.find(p=>!inXI.has(p)&&p[1]!=="GK")||pool.find(p=>!inXI.has(p));
    if(!c)break;xi.push(c);inXI.add(c);need--;
  }
  return xi;
}
function topN(teamKey,n){
  // best-XI players plus next best by score, up to n (used for Top-15 mode)
  const xi=buildXI(teamKey);
  if(n<=xi.length)return xi.slice(0,n);
  const inXI=new Set(xi);
  const rest=S[teamKey].players.filter(p=>!p[7]&&!inXI.has(p))
    .map(p=>[p,pscore(p,teamKey)]).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  return xi.concat(rest.slice(0,n-xi.length));
}
function teamScore(teamKey){
  if(MODE==='xi')return buildXI(teamKey).reduce((s,p)=>s+pscore(p,teamKey),0);
  if(MODE==='top15')return topN(teamKey,15).reduce((s,p)=>s+pscore(p,teamKey),0);
  return S[teamKey].players.filter(p=>!p[7]).reduce((s,p)=>s+pscore(p,teamKey),0);
}

function modeName(){return MODE==='xi'?'Starting XI':MODE==='top15'?'Top 15':'Whole Squad';}
function activePlayers(teamKey){

  if(pct>=.82)return'#C89B3C';if(pct>=.68)return'#22C55E';if(pct>=.50)return'#3B82F6';

// Lift very dark team colours so they stay readable as text on the dark background.
function textSafe(hex){
  if(!hex||hex[0]!=='#'||hex.length!==7)return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=0.2126*r+0.7152*g+0.0722*b;
  if(lum>=70)return hex; // bright enough
  // blend toward white until acceptably light (more blend the darker it is)
  const f=lum<25?0.62:lum<45?0.48:0.34;
  r=Math.round(r+(255-r)*f);g=Math.round(g+(255-g)*f);b=Math.round(b+(255-b)*f);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function playerColor(s){
  if(s>=9)return'#C89B3C';if(s>=7.5)return'#22C55E';if(s>=6)return'#3B82F6';
  if(s>=4)return'#8B5CF6';if(s>=2)return'#F97316';if(s>=.5)return'#EF4444';return'#475569';
}

// Cached scores recomputed on mode switch
let TOTALS={},RANKED=[];
function recompute(){
  TOTALS={};for(const k of Object.keys(S))TOTALS[k]=teamScore(k);
  RANKED=[...Object.keys(S)].sort((a,b)=>TOTALS[b]-TOTALS[a]);

// ════════════ WIN PROBABILITY ════════════
function winProbs(sA,sB){
  if(!sA||!sB||Math.abs(sA-sB)<0.001)return{wA:36,d:28,wB:36};
  const r=sA/sB,x=Math.log(r)*1.5;
  const pW=1/(1+Math.exp(-x));
  const pD=0.28*Math.exp(-0.30*Math.abs(x));
  const wA=Math.round(pW*(1-pD)*100);
  const wB=Math.round((1-pW)*(1-pD)*100);
  return{wA,d:100-wA-wB,wB};
}
function fairOdds(p){return p<=0?'—':(1/(p/100)).toFixed(2);}

// ════════════ KNOCKOUT ADVANCEMENT (Round of 32 onward — no draws stand) ════════════
// In knockouts a draw at 90' goes to extra time then penalties; one side advances.
// We convert the model's internal win/draw/loss into a 2-way ADVANCEMENT prob summing to 100%
// by redistributing the draw probability proportionally onto the two sides (their relative
// strength is the best signal for who survives ET/penalties — squad depth, which this model measures).
// We also surface the internal 90' draw prob so the UI can flag likely ET/penalties.
const ET_PENS_THRESHOLD=28; // internal 90' draw % at/above which we flag extra time/penalties.
                            // 28% = the model's draw output for evenly-matched teams, so the flag
                            // fires only when the tie is near dead-even (rare, won't cry wolf).
function advanceProbs(sA,sB){
  const {wA,d,wB}=winProbs(sA,sB);
  // redistribute the draw proportionally onto the two sides by their 90' win shares
  const base=wA+wB;
  let advA,advB;
  if(base<=0){advA=50;advB=50;}
  else{advA=Math.round((wA+d*(wA/base))*1);advB=100-Math.round((wA+d*(wA/base)));}
  // guard rounding
  advA=Math.max(0,Math.min(100,advA));advB=100-advA;
  return {advA,advB,draw90:d,wA,wB};
}
function etPensLikely(sA,sB){return advanceProbs(sA,sB).draw90>=ET_PENS_THRESHOLD;}

// ════════════ BETTING ENGINE (pure model — only markets derivable from win/draw/loss) ════════════
// Builds two blocks (Safe, Higher-risk). Each can be 1 or several lines, with % stake splits.
// Universal bookmaker market names. NO goals-based markets (model has no goals opinion).
function bettingPlan(kA,kB){
  const nA=S[kA].meta.name,nB=S[kB].meta.name,eA=S[kA].meta.emoji,eB=S[kB].meta.emoji;
  const sA=TOTALS[kA],sB=TOTALS[kB];
  const {wA,d,wB}=winProbs(sA,sB);
  const strong=sA>=sB?{k:kA,n:nA,e:eA,p:wA}:{k:kB,n:nB,e:eB,p:wB};
  const weak=sA>=sB?{k:kB,n:nB,e:eB,p:wB}:{k:kA,n:nA,e:eA,p:wA};
  const ratio=Math.max(sA,sB)/Math.max(0.01,Math.min(sA,sB));
  // Outcome side mapping (standard across bookmakers): home/teamA, away/teamB, or draw.
  // Double Chance shown as e.g. "Spain or Draw". Draw No Bet shown as "Draw No Bet - Spain".
  const dcStrong = strong.p + d;            // strong win or draw
  const dcNoWeak = wA + wB;                  // either team (no draw) = 12
  const dnbStrong = Math.round(strong.p/(strong.p+weak.p)*100); // draw-no-bet implied
  // ---------- plain-language verdict ----------
  let verdict;
  if(ratio>=1.8) verdict=`The model rates ${strong.e} ${strong.n} clearly stronger (${ratio.toFixed(2)}× the squad strength of ${weak.n}). It expects ${strong.n} to win, though football always allows surprises.`;
  else if(ratio>=1.35) verdict=`The model gives ${strong.e} ${strong.n} a real but not overwhelming edge (${ratio.toFixed(2)}× ${weak.n}'s strength). Lean ${strong.n}, but a draw is very much in play.`;
  else if(ratio>=1.12) verdict=`The model sees only a slight edge to ${strong.e} ${strong.n} (${ratio.toFixed(2)}×). This is close — treat any bet with caution.`;
  else verdict=`The model sees these two as almost evenly matched (${ratio.toFixed(2)}×). It has no real opinion on a winner — the safest view is that anything can happen.`;

  // ---------- SAFE block ----------
  // Pick highest-probability markets. Always at least one line.
  const safe=[];
  // Double chance for the stronger side is the safety anchor when there's any edge
  if(ratio>=1.12){
    safe.push({
      market:`Double Chance — ${strong.n} or Draw`, sporty:`Double Chance — ${strong.n} or Draw`,
      prob:dcStrong, odds:fairOdds(dcStrong), outc:["s","d"],
      plain:`You win if ${strong.n} win OR the match is a draw. You only lose if ${weak.n} win. The single safest pick here.`
    });
  } else {
    // too close — safest is "either team (not draw won't help)"; offer Double Chance both-sides framing
    safe.push({
      market:`Double Chance — ${strong.n} or Draw`, sporty:`Double Chance — ${strong.n} or Draw`,
      prob:dcStrong, odds:fairOdds(dcStrong), outc:["s","d"],
      plain:`Even in a coin-flip match this is the calmest option: win if ${strong.n} avoid defeat (win or draw). Low payout, high hit-rate.`
    });
  }
  // If the stronger side is strong enough, Draw No Bet is a clean second safe line
  if(ratio>=1.35){
    safe.push({
      market:`Draw No Bet — ${strong.n}`, sporty:`Draw No Bet — ${strong.n}`,
      prob:dnbStrong, odds:fairOdds(dnbStrong), outc:["s"], voidOnDraw:true,
      plain:`Back ${strong.n}, but if it's a draw you get your stake back (bet voided). You only lose if ${weak.n} win. A notch riskier than Double Chance but pays a bit more.`
    });
  }
  // ---------- HIGHER-RISK block ----------
  // De-extremed: the high-risk pick must be a genuinely higher-PAYOUT bet that the model still
  // rates as a real possibility — NOT a reflexive longshot on the underdog. We only offer the
  // underdog/draw when the model gives it enough probability to be a sensible (if riskier) play;
  // otherwise we say there's no high-risk edge and point back to the safe block.
  const risky=[];
  // Helper: a line is a "sensible" high-risk pick if its model probability clears a floor that
  // scales with how close the match is. In a tight match the draw/underdog are legitimate; in a
  // lopsided match, only the favourite-to-win carries real model backing.
  const HIGHRISK_FLOOR=22; // model % below which a pick is a pure longshot, not offered as the high-risk line
  if(ratio>=1.8){
    // lopsided: the favourite winning outright is the higher-payout-but-backed play (draw loses it)
    risky.push({
      market:`Match Result — ${strong.n} to Win`, sporty:`Match Result — ${strong.n} to win`,
      prob:strong.p, odds:fairOdds(strong.p), outc:["s"],
      plain:`Back ${strong.n} to win outright in 90 minutes. The model's main expected outcome and a bigger payout than the safe options; lost only on a draw or upset.`
    });
    // The underdog is only worth mentioning as a tiny flutter, and we say so honestly — not as a real edge
    if(weak.p>=HIGHRISK_FLOOR){
      risky.push({
        market:`Match Result — ${weak.n} Upset`, sporty:`Match Result — ${weak.n} to win`,
        prob:weak.p, odds:fairOdds(weak.p), outc:["w"],
        plain:`The model still gives ${weak.n} a real chance (${weak.p}%) — a higher-payout gamble, but not a coin-flip.`
      });
    }
  } else if(ratio>=1.35){
    // clear-ish edge: favourite to win is the value lift over the safe double-chance
    risky.push({
      market:`Match Result — ${strong.n} to Win`, sporty:`Match Result — ${strong.n} to win`,
      prob:strong.p, odds:fairOdds(strong.p), outc:["s"],
      plain:`Back ${strong.n} to win in 90 minutes. The model leans this way; pays more than the safe block, but a draw loses it.`
    });
    if(d>=HIGHRISK_FLOOR){
      risky.push({
        market:`Draw`, sporty:`Match Result — Draw`,
        prob:d, odds:fairOdds(d), outc:["d"],
        plain:`Back the draw. The model rates one a genuine possibility here (${d}%), and the draw usually pays well.`
      });
    }
  } else {
    // close match: the higher-payout-but-backed plays are the draw and the slight underdog,
    // BOTH of which the model rates as live in an even game
    if(d>=HIGHRISK_FLOOR){
      risky.push({
        market:`Draw`, sporty:`Match Result — Draw`,
        prob:d, odds:fairOdds(d), outc:["d"],
        plain:`In an even match the draw is the smart higher-payout angle — the model rates it a genuine possibility (${d}%).`
      });
    }
    if(weak.p>=HIGHRISK_FLOOR){
      risky.push({
        market:`Match Result — ${weak.n} to Win`, sporty:`Match Result — ${weak.n} to win`,
        prob:weak.p, odds:fairOdds(weak.p), outc:["w"],
        plain:`Back the slight underdog ${weak.n}. The model rates this a real chance (${weak.p}%) in a near-even match, for a higher payout.`
      });
    }
    // if BOTH are below the floor (extremely tight, no standout) fall back to the favourite to win
    if(!risky.length){
      risky.push({
        market:`Match Result — ${strong.n} to Win`, sporty:`Match Result — ${strong.n} to win`,
        prob:strong.p, odds:fairOdds(strong.p), outc:["s"],
        plain:`Back ${strong.n} to edge it in 90 minutes — a higher payout than the safe option in a tight match.`
      });
    }
  }
  // If, after de-extreming, the high-risk pick isn't meaningfully more profitable than the safest
  // safe line, flag that there's no real high-risk edge (don't manufacture a longshot).
  const safestProb=safe.length?Math.max(...safe.map(s=>s.prob)):0;
  const bestRiskOdds=risky.length?Math.max(...risky.map(r=>parseFloat(r.odds)||0)):0;
  const safestOdds=safe.length?Math.min(...safe.map(s=>parseFloat(s.odds)||99)):99;
  const noHighEdge = bestRiskOdds>0 && safestOdds>0 && (bestRiskOdds < safestOdds*1.25);
  // ITEM 4a — WITHIN-BLOCK NO-LOSS CHECK (against the model's OWN fair odds, no external data).
  // For a set of lines with a % stake split, compute the net return for each of the 3 real outcomes
  // (strong win / draw / weak win). If EVERY outcome nets a loss, the split is self-contradictory and
  // we flag it. Lines that share outcomes are handled correctly because we sum per-outcome payouts.
  // A "voidOnDraw" line (Draw No Bet) refunds its stake on a draw (no loss, no win on that outcome).
  function blockOutcomeReturns(lines,splitPct){
    // splitPct: array of % (sums ~100). Returns {s,d,w} = net profit per unit total stake.
    const res={s:0,d:0,w:0};
    ['s','d','w'].forEach(oc=>{
      let ret=0;
      lines.forEach((l,i)=>{
        const stake=splitPct[i]/100; // fraction of total
        const odd=parseFloat(l.odds)||0;
        if(l.outc&&l.outc.includes(oc)) ret+=stake*odd;       // line wins → stake×odds back
        else if(l.voidOnDraw&&oc==='d') ret+=stake;           // void → stake refunded
        // else: line loses → contributes 0
      });
      res[oc]=ret-1; // minus the full unit stake
    });
    return res;
  }
  function blockGuaranteedLoss(lines,splitPct){
    const r=blockOutcomeReturns(lines,splitPct);
    return r.s<0 && r.d<0 && r.w<0; // every outcome loses
  }
  const safeSplit0=stakeSplit(safe), riskSplit0=stakeSplit(risky);
  const safeGuaranteedLoss=blockGuaranteedLoss(safe,safeSplit0);
  const riskGuaranteedLoss=blockGuaranteedLoss(risky,riskSplit0);
  return {verdict,safe,risky,wA,d,wB,ratio,strong,weak,nA,nB,eA,eB,noHighEdge,
          blockOutcomeReturns,blockGuaranteedLoss,safeGuaranteedLoss,riskGuaranteedLoss};
}

// Suggested stake split within a block: weight by probability (favour higher-hit-rate line),
// normalised to %. Single line → 100%.
function stakeSplit(lines){
  if(lines.length===1)return[100];
  const w=lines.map(l=>Math.max(1,l.prob));const sum=w.reduce((a,b)=>a+b,0);
  return w.map(x=>Math.round(x/sum*100));
}

// ════════════ TOURNAMENT SIMULATION (live, both modes) ════════════
function simulate(){
  const sc=teamScore;
  const gs={};for(const g of GROUP_ORDER){gs[g]=[...GROUPS[g]].sort((a,b)=>sc(b)-sc(a));}
  const g1=g=>gs[g][0],g2=g=>gs[g][1],g3=g=>gs[g][2];
  const thirds=GROUP_ORDER.map(g=>[sc(gs[g][2]),g,gs[g][2]]).sort((a,b)=>b[0]-a[0]);
  const q3=new Set(thirds.slice(0,8).map(x=>x[1]));
  const win=(a,b)=>sc(a)>=sc(b)?a:b, los=(a,b)=>sc(a)>=sc(b)?b:a;
  const R32=[[g1("E"),g3("F")],[g1("I"),g3("H")],[g2("A"),g2("B")],[g1("F"),g2("C")],[g2("K"),g2("L")],[g1("H"),g2("J")],[g1("D"),g3("A")],[g1("G"),g3("D")],[g1("C"),g2("F")],[g2("I"),g2("E")],[g1("A"),g3("C")],[g1("L"),g3("I")],[g1("J"),g2("H")],[g2("D"),g2("G")],[g1("B"),g3("J")],[g1("K"),g3("E")]];
  const r32w=R32.map(([a,b])=>win(a,b));
  const R16=[];for(let i=0;i<8;i++)R16.push([r32w[i*2],r32w[i*2+1]]);
  const r16w=R16.map(([a,b])=>win(a,b));
  const QF=[];for(let i=0;i<4;i++)QF.push([r16w[i*2],r16w[i*2+1]]);
  const qfw=QF.map(([a,b])=>win(a,b));
  const SF=[[qfw[0],qfw[1]],[qfw[2],qfw[3]]];
  const sfw=SF.map(([a,b])=>win(a,b)), sfl=SF.map(([a,b])=>los(a,b));
  const FN=[sfw[0],sfw[1]];
  const champ=win(sfw[0],sfw[1]),runup=los(sfw[0],sfw[1]);
  const t3=win(sfl[0],sfl[1]),t4=los(sfl[0],sfl[1]);
  return{gs,q3,thirds,R32,r32w,R16,r16w,QF,qfw,SF,sfw,sfl,FN,champ,runup,t3,t4};
}

  const cards=teams.map(key=>{

      <div class="tscore-sub">${pct}% of max · ${modeTag()} · avg ${(tot/act.length).toFixed(2)}/player</div>
      <div class="tbar"><div class="tbar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="tstats">

        <div class="tstat"><div class="tslabel">ELITE ≥7</div><div class="tsval" style="color:${colT}">${elite}</div></div>

// ════════════ RANK ════════════
function renderRank(){
  // compare current-mode rank vs a reference mode (squad if not in squad, else xi) for delta display
  const refMode=MODE==='squad'?'xi':'squad';
  const cur=MODE;MODE=refMode;const otherTotals={};for(const k of Object.keys(S))otherTotals[k]=teamScore(k);
  const otherRanked=[...Object.keys(S)].sort((a,b)=>otherTotals[b]-otherTotals[a]);MODE=cur;
  const refLbl=refMode==='squad'?'Squad':'XI';
  const rows=RANKED.map((key,i)=>{
    const sq=S[key],m=sq.meta,tot=TOTALS[key],mx=maxScore();
    const pct=(tot/mx*100).toFixed(1),col=m.color,colT=textSafe(m.color);
    const act=activePlayers(key);
    const medals=['🥇','🥈','🥉'];const medal=i<3?medals[i]:''+(i+1);
    const oRank=otherRanked.indexOf(key)+1;const d=oRank-(i+1);
    const delta=d>0?`<span class="delta-up">▲${d}</span>`:d<0?`<span class="delta-dn">▼${-d}</span>`:`<span class="delta-eq">—</span>`;
    return`<tr onclick="nav('team',{teamKey:'${key}'})" style="cursor:pointer">
      <td style="font-size:14px;text-align:center">${medal}</td>
      <td><span style="font-size:20px">${m.emoji}</span></td>
      <td style="font-weight:700;color:${colT}">${m.name}</td>
      <td style="text-align:center;color:var(--mut)">${m.group}</td>
      <td style="font-family:monospace;font-weight:800;color:${colT};font-size:15px">${tot.toFixed(1)}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--mut);min-width:36px">${pct}%</span>
        <div class="mini-bar" style="width:110px"><div class="mini-fill" style="width:${pct}%;background:${col}"></div></div></div></td>
      <td style="text-align:center">${rankPerfCell(key)}</td>
      <td style="text-align:center">${delta}</td>
    </tr>`;
  }).join('');
  return`<div class="sect-title">ALL 48 TEAMS · RANKED BY ${modeTag().toUpperCase()} STRENGTH (max ${maxScore()})</div>
  <details class="info-box"><summary>ⓘ What do "WON %" and "model % ✓" mean?</summary>
    <div class="info-body"><p><b>WON %</b> — the team's real-world results so far. Of all the points they could have won, what share did they actually get? (Win = 3 points, draw = 1, loss = 0.) So "WON 67%" means they've banked two-thirds of the points available. It's pure reality — the model plays no part. It does <i>not</i> change with the XI / Top 15 / Whole Squad toggle, because real results don't depend on the model.</p>
    <p><b>model % ✓</b> — how well <i>this model</i> predicted that team's matches. It's not a simple right/wrong tally: it's a <b>Brier-based score</b> that weighs the model's confidence. If the model gave a team a 25% chance and that outcome didn't happen, it's barely penalised — only confident wrong calls hurt the score. This figure <i>does</i> shift with the toggle, because each basis changes the model's predictions.</p>
    <p>Put simply: <b>WON % is what really happened; model % ✓ is how right the model was about it.</b> Both update automatically as new results come in. The same Brier method is used everywhere accuracy appears.</p></div>
  </details>
  <div style="overflow-x:auto"><table class="rank-table">
    <thead><tr><th>#</th><th></th><th>Nation</th><th>Grp</th><th>Score</th><th>% of Max</th><th>Won · Model</th><th>vs ${refLbl}</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
  <div style="font-size:10px;color:var(--dim);margin-top:12px;line-height:1.7">
    <b style="color:var(--mut)">Won · Model</b> column: <b style="color:var(--mut)">WON %</b> is what really happened on the pitch — the share of points the team has actually won so far (win=3, draw=1, loss=0). <b style="color:var(--mut)">model % ✓</b> is how well this model predicted that team's results — a Brier-based score that rewards confident correct calls and only penalises confident wrong ones (a low-probability outcome that doesn't happen barely counts against it). Real world on top, model below; both update as new results come in. <b style="color:var(--mut)">vs ${refLbl}</b> shows rank change vs the ${refLbl==='Squad'?'Whole-Squad':'Starting XI'} basis. ▲ = ranks higher in current ${modeTag()} mode.
    Toggle the basis using the switch in the header. Click any row for squad detail.</div>`;
}

  const tot=TOTALS[key],pct=(tot/mx*100).toFixed(1);

// ════════════ BETTING PLAN RENDERER (shared by Compare + Fixtures) ════════════
function bankrollChange(v){STATE.bankroll=v;redistributeStakes();}
// Click-to-select a betting line (cross-block: user may mix Most Reliable + Most Profitable freely).
// Compute per-outcome net return (per R1 total stake) for a given set of selected cards.
function _selReturns(sel){
  const sum=sel.reduce(function(a,c){return a+Math.max(1,parseFloat(c.getAttribute('data-prob'))||1);},0);
  const splits=sel.map(function(c){return sum>0?Math.max(1,parseFloat(c.getAttribute('data-prob'))||1)/sum:0;});
  const ret={s:0,d:0,w:0};
  ['s','d','w'].forEach(function(oc){
    let r=0;
    sel.forEach(function(c,i){
      const odd=parseFloat(c.getAttribute('data-odds'))||0;
      const outc=(c.getAttribute('data-outc')||'').split(',');
      const isVoid=c.getAttribute('data-void')==='1';
      if(outc.indexOf(oc)>=0)r+=splits[i]*odd;
      else if(isVoid&&oc==='d')r+=splits[i];
    });
    ret[oc]=r-1;
  });
  return ret;
}
// Is a selection "block-worthy dumb"? (1) backing BOTH teams to win (opposite team-win lines);
// (2) loses money on the model's MOST-LIKELY outcome; (3) guaranteed loss (every outcome negative).
// All judged purely from the model's own probabilities and fair odds — no external data.
function _blockWorthy(sel,mostLikely){
  if(sel.length<2)return null;
  // (1) opposite teams-to-win: a line winning ONLY on 's' AND a line winning ONLY on 'w'
  const hasStrongWinOnly=sel.some(function(c){const o=(c.getAttribute('data-outc')||'').split(',');return o.length===1&&o[0]==='s';});
  const hasWeakWinOnly=sel.some(function(c){const o=(c.getAttribute('data-outc')||'').split(',');return o.length===1&&o[0]==='w';});
  if(hasStrongWinOnly&&hasWeakWinOnly)
    return 'You have picked both teams to win — they cannot both happen, so this is not a sensible combination.';
  const ret=_selReturns(sel);
  // (3) guaranteed loss
  if(ret.s<0&&ret.d<0&&ret.w<0)
    return 'This combination loses money on every possible outcome — it cannot profit.';
  // (2) loses on the model's most-likely outcome
  if(mostLikely&&ret[mostLikely]<0){
    const lbl=mostLikely==='s'?'the favoured team winning':mostLikely==='w'?'the underdog winning':'a draw';
    return 'This combination loses money on the outcome the model rates most likely ('+lbl+'), so it is not a smart mix.';
  }
  return null;
}
function toggleLine(lineId){
  const card=document.querySelector('.bline-sel[data-line="'+lineId+'"]');
  if(!card)return;
  const turningOn=card.getAttribute('data-on')!=='1';
  if(turningOn){
    // simulate the prospective selection and block if it would be dumb
    const all=Array.prototype.slice.call(document.querySelectorAll('.bline-sel'));
    const panel=card.closest('.bpanel');
    const mostLikely=panel?panel.getAttribute('data-mostlikely'):null;
    const prospective=all.filter(function(c){return c.getAttribute('data-on')==='1'||c===card;});
    const reason=_blockWorthy(prospective,mostLikely);
    if(reason){_flashBlock(card,reason);return;} // refuse the selection
  }
  card.setAttribute('data-on',turningOn?'1':'0');
  redistributeStakes();
}
// Brief red flash on a card that was blocked, with the reason.
function _flashBlock(card,reason){
  const warnEl=document.getElementById('bet-conflict-warn');
  if(warnEl)warnEl.innerHTML='<div style="color:var(--red);font-weight:700">🚫 '+reason+'</div>';
  card.style.transition='none';
  card.style.borderColor='var(--red)';card.style.background='rgba(239,68,68,.12)';
  setTimeout(function(){card.style.transition='border-color .4s,background .4s';
    const on=card.getAttribute('data-on')==='1';
    card.style.borderColor=on?'var(--gold)':'var(--bdr)';
    card.style.background=on?'rgba(200,155,60,.06)':'var(--card)';},600);
}
// ITEM 4 (revised) — TICK & REDISTRIBUTE across BOTH blocks as one pool.
// The user may pick any combination of lines from Most Reliable and Most Profitable. The whole
// bankroll (100%) is split across ALL selected lines together, weighted by probability. We then
// check the selected set for: (1) a guaranteed loss — every outcome nets negative → hard red WARN;
// (2) redundancy — two selected lines that both win on the same outcome → soft grey note.
// Pure stake maths on the model's own fair odds. No external data.
function redistributeStakes(){
  const v=STATE.bankroll;const amt=parseFloat(v);
  const all=Array.prototype.slice.call(document.querySelectorAll('.bline-sel'));
  const sel=all.filter(function(c){return c.getAttribute('data-on')==='1';});
  // weight by probability across the WHOLE selected pool (sums to 100%)
  const sum=sel.reduce(function(a,c){return a+Math.max(1,parseFloat(c.getAttribute('data-prob'))||1);},0);
  all.forEach(function(c){
    const lineId=c.getAttribute('data-line');
    const on=c.getAttribute('data-on')==='1';
    const pctEl=document.querySelector('.stake-pct[data-line="'+lineId+'"]');
    const randEl=document.querySelector('.stake-rand[data-line="'+lineId+'"]');
    const chk=document.querySelector('.bline-check[data-line="'+lineId+'"]');
    let pct=0;
    if(on&&sum>0)pct=Math.round(Math.max(1,parseFloat(c.getAttribute('data-prob'))||1)/sum*100);
    // visual selected state
    c.style.opacity=on?'1':'.45';
    c.style.borderColor=on?'var(--gold)':'var(--bdr)';
    c.style.background=on?'rgba(200,155,60,.06)':'var(--card)';
    if(chk){chk.style.background=on?'var(--gold)':'transparent';chk.style.borderColor=on?'var(--gold)':'var(--dim)';chk.textContent=on?'✓':'';}
    if(pctEl)pctEl.textContent=pct+'%';
    if(randEl){randEl.setAttribute('data-pct',pct);randEl.textContent=(v&&!isNaN(amt))?('R'+(amt*pct/100).toFixed(0)):'';}
  });
  // ---- soft warnings on the SELECTED pool (block-worthy combos can't reach here) ----
  const warnEl=document.getElementById('bet-conflict-warn');
  if(warnEl){
    let msg='';
    if(sel.length>=1){
      const ret=_selReturns(sel);
      // redundancy: any outcome that 2+ selected lines both win on
      let redundant=false;
      ['s','d','w'].forEach(function(oc){
        const n=sel.filter(function(c){return (c.getAttribute('data-outc')||'').split(',').indexOf(oc)>=0;}).length;
        if(n>=2)redundant=true;
      });
      // negative on two of three outcomes = profits only on one (unwise spread)
      const negCount=['s','d','w'].filter(function(oc){return ret[oc]<0;}).length;
      if(negCount>=2)msg='<div style="color:var(--amb);font-weight:700">⚠️ This mix only profits on one outcome and loses on the other two — allowed, but not a balanced spread. Review before staking.</div>';
      else if(redundant)msg='<div style="color:var(--mut)">↺ Note: some selected lines win on the same outcome (overlapping cover). Not a loss, but you are doubling up on that result rather than spreading risk.</div>';
    } else {
      msg='<div style="color:var(--mut)">No lines selected — tap a card to include it.</div>';
    }
    warnEl.innerHTML=msg;
  }
}

function nowMs(){return Date.now();}
function fxDate(iso){return new Date(iso);}
const MATCH_DURATION_MS=2.5*60*60*1000; // 90min + half-time + stoppage + buffer
function fxStatus(f){
  // f=[A,B,iso,scA,scB,venue]
  // 'done' if a final score is recorded OR kickoff was more than ~2.5h ago (match must be over).
  // 'live' from kickoff until ~2.5h after. 'upcoming' before kickoff.
  const ko=fxDate(f[2]).getTime(), now=nowMs();
  if(f[3]!==null&&f[3]!==undefined)return'done';
  if(now<ko)return'upcoming';
  if(now<ko+MATCH_DURATION_MS)return'live';
  return'done'; // kicked off long ago, no score entered yet — treat as completed so it leaves "upcoming"
}
function fmtKick(iso){
  const d=fxDate(iso);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let h=d.getHours(),m=d.getMinutes();const ap=h>=12?'pm':'am';h=h%12||12;
  const mm=m<10?'0'+m:m;
  return `${days[d.getDay()]} ${d.getDate()} ${mons[d.getMonth()]} · ${h}:${mm}${ap}`;
}
function daysAway(iso){
  const diff=fxDate(iso).getTime()-nowMs();
  const h=diff/3600000;
  if(h<0)return'';
  if(h<1)return`in ${Math.round(h*60)} min`;
  if(h<24)return`in ${Math.round(h)}h`;
  return`in ${Math.round(h/24)}d`;
}
// Resolve a KO slot code to a team key via QUALIFIED (empty until known)
function resolveSlot(code){return QUALIFIED[code]||null;}
function slotLabel(code){
  // human description for unresolved slots
  if(/^[123][A-L]$/.test(code)){const pos={1:'Winner',2:'Runner-up',3:'3rd'}[code[0]];return`${pos} Grp ${code[1]}`;}
  if(/^W\d+/.test(code))return`Winner M${code.slice(1)}`;
  if(/^L\d+/.test(code))return`Loser M${code.slice(1)}`;
  return code;
}
// Sorted upcoming group fixtures (soonest first)
function upcomingFixtures(){
  // live matches first (most interest), then upcoming by soonest kickoff
  return FIXTURES.map((f,i)=>({f,i,st:fxStatus(f)}))
    .filter(x=>x.st!=='done')
    .sort((a,b)=>{
      if(a.st==='live'&&b.st!=='live')return -1;
      if(b.st==='live'&&a.st!=='live')return 1;
      return fxDate(a.f[2])-fxDate(b.f[2]);
    });
}
function recentDone(){
  return FIXTURES.map((f,i)=>({f,i,st:fxStatus(f)}))

// ════════════ ACCURACY ENGINE (model predictions vs real results — pure W/D/L, no goals, no external data) ════════════
// Scores the model against completed matches. Recomputes per mode (XI/Top15/Squad).
// Brier score: mean squared error between predicted probability vector and the one-hot actual outcome.
//   Lower is better. 0 = perfect, ~0.667 = worst possible for 3 outcomes, 0.333 = uninformed (33/33/33).
// Hit-rate: % of matches where the model's single most-likely outcome matched reality.

function actualOutcome(f){
  // returns 'A' (home/teamA win), 'B' (away win), 'D' (draw) — from the real scoreline, outcome only
  if(f[3]===null||f[3]===undefined)return null;
  if(f[3]>f[4])return'A';if(f[4]>f[3])return'B';return'D';
}
function completedMatches(){return FIXTURES.filter(f=>f[3]!==null&&f[3]!==undefined);}

// Score the model for the CURRENT mode across all completed matches
function accuracyStats(){
  const done=completedMatches();
  let brierSum=0, hits=0, n=0;
  const rows=[];
  for(const f of done){
    const a=f[0],b=f[1];
    if(!S[a]||!S[b])continue;
    const sA=TOTALS[a],sB=TOTALS[b];
    const {wA,d,wB}=winProbs(sA,sB); // percentages 0-100
    const pA=wA/100,pD=d/100,pB=wB/100;
    const act=actualOutcome(f);
    // KNOCKOUT HANDLING (Round of 32+): f[6]=isKnockout flag, f[7]=team that advanced ('A'/'B') if level at 90'.
    // A draw at 90' in a knockout is a legitimate model-correct outcome (the model predicts the 90' result);
    // who then survives extra time / penalties is credited as a flat bonus to the model's favoured side,
    // backing the thesis that squad depth (which this model measures) carries a team through ET and penalties.
    const isKO=f[6]===true||f[6]===1;
    const advanced=f[7]; // 'A' or 'B' when a KO was level at 90' and decided in ET/pens
    // one-hot actual (90-minute result)
    const oA=act==='A'?1:0,oD=act==='D'?1:0,oB=act==='B'?1:0;
    // Brier = sum of squared diffs across the 3 outcomes (always scored on the 90' result)
    let brier=(pA-oA)**2+(pD-oD)**2+(pB-oB)**2;
    brierSum+=brier;
    // model's single pick = highest probability
    const pick=pA>=pD&&pA>=pB?'A':pB>=pD&&pB>=pA?'B':'D';
    // HIT logic: in a knockout level at 90', a predicted draw counts as correct; and if the model
    // favoured the side that advanced (in ET/pens), that also counts as correct (depth thesis).
    let hit=pick===act;
    if(isKO&&act==='D'){
      const modelFav=pA>pB?'A':pB>pA?'B':null;
      if(pick==='D')hit=true;                       // predicted the 90' draw → correct
      else if(advanced&&modelFav===advanced)hit=true; // favoured team advanced in ET/pens → correct
    }
    if(hit)hits++;
    n++;
    rows.push({f,a,b,sA,sB,wA,d,wB,act,pick,hit,brier,isKO,advanced});
  }
  const meanBrier=n?brierSum/n:null;
  const hitRate=n?hits/n*100:null;
  // Skill score vs an uninformed 33/33/33 baseline (Brier of baseline = 3*(1/3-onehot)^2 averaged = 0.4444... per match actually)
  // Baseline Brier for always 1/3,1/3,1/3: (1/3-1)^2+(1/3)^2+(1/3)^2 = 4/9+1/9+1/9 = 6/9 = 0.6667? No:
  // outcome side gets (1/3-1)^2=0.4444, other two (1/3-0)^2=0.1111 each → 0.4444+0.1111+0.1111=0.6667
  const baseBrier=0.6667;
  const skill=meanBrier!=null?(1-meanBrier/baseBrier)*100:null; // % better than uninformed
  return {n,meanBrier,hitRate,skill,rows,hits};
}

// Per-team: actual performance (opponent-blind PPG%) + model accuracy for that team's completed matches
function teamRecord(teamKey){
  const done=completedMatches().filter(f=>f[0]===teamKey||f[1]===teamKey);
  let pts=0, played=0, correct=0, w=0,dr=0,l=0, brierSum=0;
  for(const f of done){
    const isA=f[0]===teamKey, oppKey=isA?f[1]:f[0];
    if(!S[oppKey])continue;
    const act=actualOutcome(f);
    const teamWon=(isA&&act==='A')||(!isA&&act==='B');
    const draw=act==='D';
    if(teamWon){pts+=3;w++;}else if(draw){pts+=1;dr++;}else{l++;}
    played++;
    // model prediction for this match (current mode via TOTALS)
    const sA=TOTALS[f[0]],sB=TOTALS[f[1]];
    const {wA,d,wB}=winProbs(sA,sB);
    const pA=wA/100,pD=d/100,pB=wB/100;
    const oA=act==='A'?1:0,oD=act==='D'?1:0,oB=act==='B'?1:0;
    brierSum+=(pA-oA)**2+(pD-oD)**2+(pB-oB)**2; // 0=perfect … 2=confident wrong
    const pick=wA>=d&&wA>=wB?'A':wB>=d&&wA<=wB?'B':'D';
    if(pick===act)correct++;
  }
  const ppgPct=played?Math.round(pts/(played*3)*100):null; // % of max points (opponent-blind, real results)
  // Brier-based model accuracy (confidence-weighted) — consistent with the Accuracy tab.
  // A 25% draw that doesn't happen barely dents this; only confident-wrong calls hurt.
  const meanBrier=played?brierSum/played:null;
  const modelAcc=played?Math.max(0,Math.min(100,Math.round(100*(1-meanBrier/2)))):null;
  const modelHitPct=played?Math.round(correct/played*100):null; // crude binary, kept for reference
  return {played,pts,ppgPct,modelAcc,modelHitPct,meanBrier,w,dr,l,correct};
}

function gradeLabel(skill){
  if(skill===null)return['—','var(--mut)'];
  if(skill>=25)return['Strong edge','#22C55E'];
  if(skill>=12)return['Clear edge','#3B82F6'];
  if(skill>=4)return['Slight edge','#C89B3C'];
  if(skill>=-4)return['Coin-flip','#F97316'];
  return['Below chance','#EF4444'];
}
function renderAccuracy(){
  const a=accuracyStats();
  if(a.n===0){
    return`<div class="sect-title">MODEL ACCURACY — HOW RIGHT HAS THE MODEL BEEN?</div>
      <div style="background:var(--card2);border:1px solid var(--bdr);border-radius:10px;padding:20px;text-align:center;color:var(--mut)">
      No completed matches recorded yet. Once results come in, this tab grades every prediction against what actually happened.</div>`;
  }
  // headline cards
  // Brier-based accuracy (same method used everywhere else): 100×(1−Brier/2). 50% = no-information line.
  const brierAcc=Math.max(0,Math.min(100,Math.round(100*(1-a.meanBrier/2))));
  const brierEdge=brierAcc-50; // edge over the 50% no-information point — CONSISTENT with the accuracy card
  const [grd,grdC]=gradeLabel(brierEdge);
  const hitC=a.hitRate>=55?'#22C55E':a.hitRate>=45?'#C89B3C':'#EF4444';
  const brierAccC=brierAcc>=70?'#22C55E':brierAcc>=55?'#3B82F6':brierAcc>=45?'#C89B3C':'#EF4444';
  const brierGrade=brierAcc>=70?'Strong':brierAcc>=58?'Solid':brierAcc>=50?'Slight edge':brierAcc>=42?'Near coin-flip':'Below chance';
  const hitEdge=Math.round(a.hitRate-33.3); // hit-rate edge over a 1-in-3 blind guess (binary view companion)
  const hitEdgeC=hitEdge>=20?'#22C55E':hitEdge>=8?'#3B82F6':hitEdge>=0?'#C89B3C':'#EF4444';
  // compute all 3 modes for the comparison strip
  const cur=MODE;const modeAcc={};
  ['xi','top15','squad'].forEach(m=>{MODE=m;recompute();const s=accuracyStats();modeAcc[m]={hit:s.hitRate,brier:s.meanBrier,skill:s.skill};});
  MODE=cur;recompute();
  const modeNames={xi:'Starting XI',top15:'Top 15',squad:'Whole Squad'};
  const bestMode=Object.keys(modeAcc).sort((x,y)=>modeAcc[y].skill-modeAcc[x].skill)[0];
  const modeStrip=['xi','top15','squad'].map(m=>{
    const on=m===MODE,best=m===bestMode;

    const showVal=STATE.accView==='brier'?bAcc.toFixed(1)+'%':modeAcc[m].hit.toFixed(0)+'%';
    const showSub=STATE.accView==='brier'?'Brier accuracy':'hit-rate · Brier '+modeAcc[m].brier.toFixed(2);
    return`<div onclick="setMode('${m}')" style="cursor:pointer;flex:1;min-width:90px;background:${on?'rgba(200,155,60,.12)':'var(--card2)'};border:1px solid ${on?'var(--gold)':best?'#22C55E55':'var(--bdr)'};border-radius:9px;padding:10px;text-align:center">
      <div style="font-size:10px;font-weight:700;color:${on?'var(--gold)':'var(--mut)'};letter-spacing:.5px">${modeNames[m]}${best?' ★':''}</div>
      <div style="font-size:20px;font-weight:900;font-family:monospace;color:${on?'var(--text)':'var(--mut)'};margin-top:3px">${showVal}</div>
      <div style="font-size:9px;color:var(--mut)">${showSub}</div></div>`;
  }).join('');

  // results table (most recent first)
  const sortedRows=a.rows.slice().sort((x,y)=>fxDate(y.f[2])-fxDate(x.f[2]));
  const tableRows=sortedRows.map(r=>{
    const mA=S[r.a].meta,mB=S[r.b].meta;
    const actTxt=r.act==='A'?mA.name+' won':r.act==='B'?mB.name+' won':'Draw';
    const pickTxt=r.pick==='A'?mA.name:r.pick==='B'?mB.name:'Draw';
    const conf=Math.max(r.wA,r.d,r.wB);
    return`<tr style="border-bottom:1px solid var(--bdr)">
      <td style="padding:8px 6px;font-size:11px"><div style="display:flex;align-items:center;gap:5px"><span>${mA.emoji}</span><span style="font-weight:600">${mA.name}</span><span style="color:var(--mut)">${r.f[3]}–${r.f[4]}</span><span style="font-weight:600">${mB.name}</span><span>${mB.emoji}</span></div></td>

      <td style="padding:8px 6px;text-align:center;font-size:16px">${r.hit?'<span style="color:#22C55E">✓</span>':'<span style="color:#EF4444">✗</span>'}</td>
    </tr>`;
  }).join('');

  return`<div class="sect-title">MODEL ACCURACY — HOW RIGHT HAS THE MODEL BEEN?</div>
    <div style="font-size:11px;color:var(--mut);line-height:1.6;margin-bottom:14px;background:var(--card2);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px">
    Every completed match graded against the model's prediction — outcome only (win/draw/loss), no goals, no outside data. <b>${a.n} matches</b> scored so far${a.n<20?' · <span style="color:#F97316">early sample, read with caution</span>':''}.</div>

    <div style="display:flex;gap:8px;margin-bottom:13px;background:var(--card2);border:1px solid var(--bdr);border-radius:10px;padding:5px">
      <div onclick="setAccView('brier')" style="flex:1;cursor:pointer;text-align:center;padding:8px;border-radius:7px;background:${STATE.accView==='brier'?'rgba(34,197,94,.15)':'transparent'};border:1px solid ${STATE.accView==='brier'?'#22C55E':'transparent'}">
        <div style="font-size:11px;font-weight:800;color:${STATE.accView==='brier'?'#22C55E':'var(--mut)'}">BRIER SCORE ★</div>
        <div style="font-size:9px;color:var(--mut);margin-top:1px">smarter · rewards confidence</div></div>
      <div onclick="setAccView('binary')" style="flex:1;cursor:pointer;text-align:center;padding:8px;border-radius:7px;background:${STATE.accView==='binary'?'rgba(200,155,60,.15)':'transparent'};border:1px solid ${STATE.accView==='binary'?'var(--gold)':'transparent'}">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px">
      ${STATE.accView==='brier'?`
      <div style="background:linear-gradient(135deg,${brierAccC}1a,transparent);border:1px solid ${brierAccC}66;border-radius:11px;padding:15px">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--mut)">MODEL ACCURACY (BRIER)</div>
        <div style="font-size:30px;font-weight:900;font-family:monospace;color:${brierAccC};line-height:1.1;margin:4px 0">${brierAcc}%</div>
        <div style="font-size:11px;font-weight:700;color:${brierAccC}">${brierGrade}</div>
      </div>
      <div style="background:linear-gradient(135deg,${grdC}1a,transparent);border:1px solid ${grdC}66;border-radius:11px;padding:15px">

        <div style="font-size:30px;font-weight:900;font-family:monospace;color:${grdC};line-height:1.1;margin:4px 0">${brierEdge>0?'+':''}${brierEdge}%</div>

      </div>`:`
      <div style="background:linear-gradient(135deg,${hitC}1a,transparent);border:1px solid ${hitC}66;border-radius:11px;padding:15px">

        <div style="font-size:11px;color:var(--mut)">${a.hits} of ${a.n} matches · ${modeNames[MODE]}</div>

      ${STATE.accView==='brier'

        :`<b style="color:var(--text)">Simple hit-rate:</b> just counts how often the model's most-likely pick actually won — right or wrong, nothing in between. Easy to grasp, but it ignores how confident the model was (a 51% lean and a 90% call count the same). The Brier view is more sophisticated.`}
